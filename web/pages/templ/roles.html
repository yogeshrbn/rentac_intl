<div class="form-group">
    <!-- <pageheader heading="Company List" />-->

    <div class="clearfix">&nbsp;</div>
    <div class="alert alert-success" ng-show="Companies.length==null">
        {{Message.NoCompaniesFound}}
    </div>
    <div class="col-lg-6">
        <h3>Roles</h3>
        <table class="table table-condensed table-responsive" med-key>

            <tr class="headerRow">
                <th style="width: 30px;">S.No</th>
                <th style="width: 200px;">Role</th>

                <th>Actions</th>


            </tr>
            <tr ng-repeat="item in Roles" ng-click="GetRoleFunction(item.RoleId);">
                <td>{{$index+1}}</td>
                <td>
                    {{item.Name}}
                </td>

                <td>
                    <!--<a href="#"><span class="fa fa-edit text-primary"></span></a>&nbsp;&nbsp;-->
                </td>
            </tr>

        </table>

    </div>
    <div class="col-lg-5">
        <h3>Function(s)</h3>
        <table class="table table-condensed table-responsive">

            <tr class="headerRow">
                <th style="width: 30px;" class="text-center">#</th>
                <th style="width: 186px;">Function</th>
                <th class="text-center">View</th>
                <th class="text-center">Add</th>
                <th class="text-center">Edit</th>
                <th class="text-center">Delete</th>
            </tr>
            <tr ng-repeat-start="f in SysFunctions">
                <td ng-bind="$index+1" class="text-center">
                    <!-- <input type="checkbox" />-->

                </td>

                <td  >
                    <strong>{{f.Name}}</strong>
                </td>
                <td colspan="4"  ng-if="f.Children.length > 0 "></td>
                <td ng-if="f.Children.length == 0 " class="text-center">
                    <input type="checkbox" ng-if="f.Children.length == 0 " ng-model="f.View" ng-change="AddRoleFunction(f);" />
                </td>
                <td ng-if="f.Children.length == 0 " class="text-center">
                    <input type="checkbox" ng-if="f.Children.length == 0 " ng-model="f.Add" ng-change="AddRoleFunction(f);" />
                </td>

                <td ng-if="f.Children.length == 0 " class="text-center">
                    <input type="checkbox" ng-if="f.Children.length == 0 " ng-model="f.Edit" ng-change="AddRoleFunction(f);" />
                </td>
                <td ng-if="f.Children.length == 0 " class="text-center">
                    <input type="checkbox" ng-if="f.Children.length == 0 " ng-model="f.Delete" ng-change="AddRoleFunction(f);" />
                </td>
            </tr>
            <tr ng-repeat-end ng-if="f.Children.length > 0 ">
                <td colspan="6" style="padding:0px">
                    <table class="table table-condensed table-responsive" style="margin-bottom:0px;" >
                        <tr ng-repeat="c in f.Children">
                           

                            <td  style="width: 215px;padding-left:40px;">
                                {{c.Name}}
                            </td>

                            <td class="text-center">
                                <input type="checkbox" ng-model="c.View" ng-change="AddRoleFunction(c);" />
                            </td>
                            <td class="text-center">
                                <input type="checkbox" ng-model="c.Add" ng-change="AddRoleFunction(c);" />
                            </td>

                            <td class="text-center">
                                <input type="checkbox" ng-model="c.Edit" ng-change="AddRoleFunction(c);" />
                            </td>
                            <td class="text-center">
                                <input type="checkbox" ng-model="c.Delete" ng-change="AddRoleFunction(c);" />
                            </td>
                        </tr>
                    </table>
                </td>
              
            </tr>
        </table>
    </div>
</div>
