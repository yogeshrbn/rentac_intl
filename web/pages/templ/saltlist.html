<div class="form-group">

    <div class="col-lg-12">
        <h3>Salts</h3>
    </div>
    <div class="clearfix">&nbsp;</div>
    <div class="alert alert-success" ng-show="Salts.length==null">
         
    </div>
    <div class="col-lg-12">

        <table class="table table-condensed table-responsive" med-key>
            <tr>
                <th>Salt</th>
                <th>Dosage</th>
                <th>SCH-H</th>
                <th>SCH-H1</th>

                <th>Actions</th>


            </tr>
            <tr ng-repeat="item in Salts">
                <td>{{item.Name}}
                </td>
                <td>{{item.Dosage}}
                </td>
                <td>{{item.SCH_H}}
                </td>
                <td>{{item.SCH_H1}}
                </td>

                <td>
                    <a href="#addsalt?sId={{item.SaltId}}"><span class="fa fa-edit text-primary"></span></a>&nbsp;&nbsp;
                   <a ng-show="{{item.Status}}==1" ng-click="Activate(2,item.SaltId);"><span class="fa fa-trash text-danger"></span></a>
                    <a ng-show="{{item.Status}}==2" ng-click="Activate(1,item.SaltId);"><span class="fa fa-check text-primary"></span></a>
                </td>
            </tr>

        </table>

    </div>

</div>
