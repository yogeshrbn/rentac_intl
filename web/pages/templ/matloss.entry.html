<div class="">

    <!--<pageheader heading="Issue Items" />-->
    <div class="alert alert-success hide" ng-show="Ledgers.length==null">
        {{Message.NoCompaniesFound}}
    </div>
    <div class="col-sm-12">

        <div id="workOrderInfo">
            <form id="frmLossEntry" name="frmPurchase" method="post" class="form-horizontal">
                <div class="form-group">

                    <div class="col-sm-4">
                        <div class="form-group">
                            <label for="inputEmail3" class="col-sm-3 control-label">Party</label>
                            <div class="col-sm-8">
                                <searchableselect ng-name="val_party" ng-id="val_party" data-primarytext="TradeName" tabindex="2" data-field="Accounts"
                                                  ng-model="Trans.LedgerId" data-val="LedgerId" data-text="Name"></searchableselect>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="inputEmail3" class="col-sm-3 control-label">Site</label>
                            <div class="col-sm-8">
                                <searchableselect ng-id="val_site" ng-name="val_site" ng-model="Trans.LedgerSiteId" data-field="LedgerSites" tab-index="1" data-val="LedgerSiteId"
                                                  data-text="SiteAddress"></searchableselect>
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-4">
                        <div class="form-group">
                            <label for="inputEmail3" class="col-sm-3 control-label">Entry Date</label>
                            <div class="col-sm-4">
                                <datepicker date-format="dd/MM/yyyy">
                                    <input ng-model="Trans.EntryDate" tabindex="2" type="text" class="form-control" name="val_entryDate" id="val_entryDate" />
                                </datepicker>
                            </div>
                        </div>
                       
                    </div>
                   
                </div>
              
                <div class="col-sm-12">
                    <div class="clearfix">&nbsp;</div>
                    <div class="row addWithTable" style="height: 290px; overflow-y: auto;border: solid 1px #a5b0b5 ">

                        <div class="col-sm-12 addItemBox">
                            <div class="col-sm-3">
                                <label>
                                    Product
                                </label>
                                <searchabletext ng-id="itemSelect" local-data="AllSizes" title-field="Name" name="Name" search-fields="Name,Code"
                                                selected-object="selectedProduct" data-entry="1"> </searchabletext>
                            </div>
                            <div class="col-sm-3">
                                <label>
                                    Quantity
                                </label>
                                <input type="number" class="form-control" tabindex="6" ng-model="TransItem.Quantity"
                                       max="999999999" />
                            </div>
                            <div class="col-sm-3">
                                <label>
                                    Rate
                                </label>
                                <input type="number" class="form-control" tabindex="7" ng-model="TransItem.Rate" max="999999999" />
                            </div>
                            <div class="col-sm-2">
                                <label class="col-sm-12">&nbsp; </label>
                                <!--<input type="button" class="btn btn-primary" tabindex="8" value="Add" ng-click="addItem();" ng-show="AccessData.Add" />-->
                                <button class="btn btn-primary" value="Add" ng-keydown="addItem($event);" stopfocus="true" ng-click="addItem();" ng-show="AccessData.Add">Add</button>

                            </div>
                        </div>
                        <table class="table table-condensed table-responsive tableInput" med-key ng-delete="DeleteItem(index)">

                            <tr class="headerRow">
                                <th style="width: 15px;">#</th>
                                <th>Item</th>

                                <!--     <th>Size</th>-->
                                <th>Qty</th>
                                <th>Rate</th>
                               
                                <th width="150px"></th>
                            </tr>
                            <tr ng-repeat="item in Trans.Items" ng-delete="DeleteItem(index);">
                                <td style="width: 30px; vertical-align: middle; text-align: center; background: #e4e4e4; font-weight: bold;">
                                    {{$index+1}}
                                </td>
                                <td>
                                    {{item.Product}}
                                </td>

                                <td>
                                    {{item.Quantity}}

                                </td>
                                <td>
                                    {{item.Rate}}
                                </td>
                             
                                <td class="text-right">
                                    {{item.Amount |number:2  }}

                                </td>
                            </tr>
                            <tr ng-if="Trans.Items.length==0">
                                <td colspan="6" class="text-center text-info"><h5>No Items added.</h5></td>
                            </tr>
                        </table>

                    </div>

                    <div class="row">
                        <div class="col-sm-7 siteBox">
                            <div class="col-sm-offset-5 form-group">
                                <!--<label for="inputEmail3" class="col-sm-4 control-label">Tax Apply</label>
                                <div class="col-sm-8">
                                    <input type="radio" class="radio-inline" name="taxApply" /> Exclusive
                                    <input type="radio" class="radio-inline" name="taxApply" /> Inclusive

                                </div>-->
                            </div>
                            <div class="clearfix">&nbsp;</div>
                            <div class="col-sm-12">
                                <input type="button" style="width: 100px;" class="btn btn-default" ui-sref="losslist" value="Cancel" />

                                <input type="button" style="width: 100px;" class="btn btn-primary ml-1" ng-show="AccessData.Add ? true : false " value="Save" ng-click="Save();" />

                            </div>
                        </div>
                        <div class="col-sm-5 nopadding">
                            <table class="table  table-responsive text-bold">
                                <tr>
                                    <td class="text-right">SubTotal</td>
                                    <td class="text-right" width="80px">
                                        {{ Trans.Items |sumByKey : 'Amount'}}
                                    </td>
                                </tr>
                                <tr>
                                    <td class="text-right text-bold">
                                        <label class="control-label">
                                            Total
                                        </label>
                                    </td>
                                    <td class="text-right" width="150px">
                                        {{Trans.Total |number:2}}
                                    </td>
                                </tr>
                            </table>
                        </div>
                    </div>
                </div>
            </form>
        </div>

    </div>
    <script lang="ja">
        $('.tabContainer a').click(function (e) {
            e.preventDefault();
        });

    </script>
</div>
