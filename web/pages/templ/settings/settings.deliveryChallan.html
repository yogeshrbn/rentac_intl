<div class="col-sm-12">

    <ul class="qutoationSettingsTab nav nav-tabs" role="tablist">
        <li role="presentation" class="active">
            <a href="#delSettings"  aria-controls="delSettings" role="tab" data-toggle="tab">Settings</a>
        </li>
        <li role="presentation">
            <a href="#delOtherInfo" aria-controls="delOtherInfo" role="tab"
               data-toggle="tab">Other Info</a>
        </li>
        <li role="presentation">
            <a href="#delPrintSettings" aria-controls="delPrintSettings" role="tab"
               data-toggle="tab">Print Settings</a>
        </li>
    </ul>
    <div class="tab-content" style="border: solid 1px #c0c0c0;padding:8px; ">
        <div role="tabpanel" class="tab-pane active" id="delSettings">
            <form class="form-horizontal">
                <!--<div class="form-group">
        <label for="inputEmail3" class="col-sm-3 control-label">Challan No. Reset At</label>
        <div class="col-sm-2">
            <input type="text" class="form-control maskednumber" nodecimal ng-model="resetInterval">
        </div>
    </div>-->
                <div class="form-group">
                    <label for="inputEmail3" class="col-sm-6 control-label">Keep same prefix for each type of challan?</label>
                    <div class="col-sm-6">
                        <div class="radio-inline">
                            <input type="radio" name="rdoSamePrefix" ng-value="true" ng-model="samePrefix"> Yes

                        </div>
                        <div class="radio-inline">
                            <input type="radio" name="rdoSamePrefix" ng-value="false" ng-model="samePrefix"> No
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-12">
                        <div class="table-responsive">
                            <table class="table table-condensed" ng-if="samePrefix == false ">

                                <tr class="headerRow">
                                    <th></th>
                                    <th>Rent / Transfer</th>
                                    <th>Contract</th>
                                    <!--<th>Transfer</th>-->
                                    <th>Adjust</th>
                                    <th>Un-Hire</th>
                                    <th>Sale</th>
                                </tr>
                                <tr>
                                    <td>
                                        Prefix
                                    </td>
                                    <td><input type="text" class="form-control" maxlength="20" validateprefix ng-model="number.rentPrefix" /></td>
                                    <td><input type="text" class="form-control" maxlength="20" validateprefix ng-model="number.contractPrefix" /></td>
                                    <!--<td><input type="text" class="form-control" maxlength="20" validateprefix ng-model="number.matPrefix" /></td>-->
                                    <td><input type="text" class="form-control" maxlength="20" validateprefix ng-model="number.adjPrefix" /></td>
                                    <td><input type="text" class="form-control" maxlength="20" validateprefix ng-model="number.hirePrefix" /></td>
                                    <td><input type="text" class="form-control" maxlength="20" validateprefix ng-model="number.salePrefix" /></td>
                                </tr>
                                <tr>
                                    <td>
                                        Start
                                    </td>
                                    <td><input type="text" class="form-control maskednumber" style="text-align:left;" nodecimal maxlength="8" ng-model="number.rentStart" /></td>
                                    <td><input type="text" class="form-control maskednumber" style="text-align:left;" nodecimal maxlength="8" ng-model="number.contractStart" /></td>
                                    <!--<td><input type="text" class="form-control maskednumber" style="text-align:left;" nodecimal maxlength="8" ng-model="number.matStart" /></td>-->
                                    <td><input type="text" class="form-control maskednumber" style="text-align:left;" nodecimal maxlength="8" ng-model="number.adjStart" /></td>
                                    <td><input type="text" class="form-control maskednumber" style="text-align:left;" nodecimal maxlength="8" ng-model="number.hireStart" /></td>
                                    <td><input type="text" class="form-control maskednumber" style="text-align:left;" nodecimal maxlength="8" ng-model="number.saleStart" /></td>
                                </tr>
                            </table>
                        </div>
                    </div>
                </div>
                <div class="form-group" ng-if="samePrefix == true ">
                    <label for="inputEmail3" class="col-sm-3 control-label">Challan Prefix</label>
                    <div class="col-sm-3">
                        {{billPrefix}}
                        <input type="text" class="form-control" validatePrefix ng-model="number.billPrefix" maxlength="20">
                    </div>
                </div>
                <div class="form-group" ng-if="samePrefix == true ">
                    <label for="inputEmail3" class="col-sm-3 control-label">Challan Start At</label>
                    <div class="col-sm-2">
                        <input type="text" class="form-control maskednumber" nodecimal maxlength="8" ng-model="number.start">
                    </div>
                </div>
                <div class="form-group">
                    <label for="inputEmail3" class="col-sm-3 control-label">Allow Editing Challan Number</label>
                    <div class="col-sm-5">
                        <div class="radio-inline">
                            <label for="exampleInputName2">
                                <input type="radio" name="rdoAllowEditChallanNumber" ng-value="1" ng-model="allowEditChallanNumber" />
                                Yes
                            </label>
                        </div>
                        <div class="radio-inline">
                            <label for="exampleInputName2">
                                <input type="radio" name="rdoAllowEditChallanNumber" ng-value="0" ng-model="allowEditChallanNumber" />
                                No
                            </label>
                        </div>

                    </div>
                </div>
                <div class="form-group">
                    <label class="col-sm-3 control-label">Enable preview</label>
                    <div class="col-sm-8">
                        <label class="checkbox-inline">
                            <input type="checkbox" ng-model="enableIssuedListPreview" />
                            Items Issued Register — show challan preview (eye icon and Preview in actions menu)
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label for="inputEmail3" class="col-sm-3 control-label"> Delivery Challan Text</label>
                    <div class="col-sm-4">
                        <input type="text" class="form-control" maxlength="100" ng-model="diveryChallanText" />
                    </div>
                </div>
                <div class="form-group">
                    <label for="inputEmail3" class="col-sm-3 control-label">Taxes</label>
                    <div class="col-sm-5">
                        <div class="radio-inline">
                            <label for="exampleInputName2">
                                <input type="radio" name="applyTax" ng-value="1" ng-model="applyTax" />
                                Yes
                            </label>
                        </div>
                        <div class="radio-inline">
                            <label for="exampleInputName2">
                                <input type="radio" name="applyTax" ng-value="2" ng-model="applyTax" />
                                No
                            </label>
                        </div>

                    </div>
                </div>
                <div class="form-group">

                    <div class="col-sm-offset-3 col-sm-9">
                        <div>

                            <input type="checkbox" ng-model="freightTax" /> <label>Apply Tax On Freight</label>
                            <input type="checkbox" style="margin-left:10px;" ng-model="otherChargesTax" /> <label>Apply Tax On Other Charges</label>


                        </div>

                    </div>
                </div>
                <div class="form-group">
                    <label for="inputEmail3" class="col-sm-3 control-label">Apply Rate</label>
                    <div class="col-sm-5">
                        <div class="radio-inline">
                            <label for="exampleInputName2">
                                <input type="radio" name="rdoRec" ng-value="1" ng-model="rateType" />
                                Sale Rate
                            </label>
                        </div>
                        <div class="radio-inline">
                            <label for="exampleInputName2">
                                <input type="radio" name="rdoRec" ng-value="2" ng-model="rateType" />
                                Rent Rate
                            </label>
                        </div>
                        <div class="radio-inline">
                            <label for="exampleInputName2">
                                <input type="radio" name="rdoRec" ng-value="3" ng-model="rateType" />
                                Loss Rate
                            </label>
                        </div>
                    </div>
                </div>
                <!--<div class="form-group">
        <label for="inputEmail3" class="col-sm-3 control-label">Print Rate on Challan</label>
        <div class="col-sm-3">
            <select class="form-control" ng-model="printratetype">
                <option value="loss" ng-selected="printratetype == 'loss'">Lost Price</option>
                <option value="sale" ng-selected="printratetype == 'sale'">Sale Price</option>
            </select>
        </div>
    </div>-->
                <h4> Display Rates Settings </h4>
                <div class="form-group">

                    <div class="col-sm-offset-3 col-sm-5">
                        <div class="radio-inline">
                            <label for="exampleInputName2">
                                <input type="radio" name="showRateOf" ng-value="1" ng-model="showRateOf" />
                                Finished Good/Item
                            </label>
                        </div>
                        <div class="radio-inline">
                            <label for="exampleInputName2">
                                <input type="radio" name="showRateOf" ng-value="2" ng-model="showRateOf" />
                                BOM Components
                            </label>
                        </div>

                    </div>
                </div>
                <hr />
                <div class="form-group">
                    <label for="inputEmail3" class="col-sm-7 control-label">Warn creating challan without rate setup</label>
                    <div class="col-sm-5">

                        <div class="radio-inline">
                            <label for="exampleInputName2">
                                <input type="radio" name="warnchallanwithoutrate" ng-value="'yes'" ng-model="warnchallanwithoutrate" />
                                Yes
                            </label>
                        </div>
                        <div class="radio-inline">
                            <label for="exampleInputName2">
                                <input type="radio" name="warnchallanwithoutrate" ng-value="'no'" ng-model="warnchallanwithoutrate" />
                                No
                            </label>
                        </div>

                    </div>
                </div>
                <div class="form-group mt-3">
                    <div class="col-sm-offset-3 col-sm-9">
                        <input type="button" class="btn btn-primary" value="Save" ng-click="saveConfig ();" />
                    </div>

                </div>
            </form>
        </div>
        <div role="tabpanel" class="tab-pane" id="delOtherInfo" style="padding-bottom:30px;">
            <form>
                <div class="form-group">
                    <div>
                        <h3>Additional Information</h3>
                        <textarea ckeditor="editorOptions" ng-model="addInfo" data-ck-editor style="height:100px;"></textarea>
                    </div>
                </div>
                <div class="form-group">
                    <div>
                        <h3>Terms &amp; Conditions</h3>
                        <textarea ckeditor="editorOptions" ng-model="tnc" data-ck-editor style="height:100px;"></textarea>
                    </div>
                </div>

                <div class="form-group">
                    <div class="col-sm-3">
                        <input type="button" class="btn btn-primary" value="Save" ng-click="saveOtherConfig ();" />
                    </div>

                </div>
            </form>
        </div>
        <div role="tabpanel" class="tab-pane" id="delPrintSettings" style="padding-bottom:30px;">
            <form class="form-horizontal">
                <div class="form-group">
                    <label class="col-sm-3 control-label">Show Item Size Column On Print</label>
                    <div class="col-sm-8">
                        <label class="checkbox-inline">
                            <input type="checkbox" ng-model="showItemSizeColumnOnPrint" />
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-sm-3 control-label">Show Cartage</label>
                    <div class="col-sm-8">
                        <label class="checkbox-inline">
                            <input type="checkbox" ng-model="printShowCartage" />
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-sm-3 control-label">Show Time</label>
                    <div class="col-sm-8">
                        <label class="checkbox-inline">
                            <input type="checkbox" ng-model="printShowTime" />
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-sm-3 control-label">Contact No</label>
                    <div class="col-sm-8">
                        <label class="checkbox-inline">
                            <input type="checkbox" ng-model="printShowContactNo" />
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-sm-3 control-label">Show Rate</label>
                    <div class="col-sm-8">
                        <label class="checkbox-inline">
                            <input type="checkbox" ng-model="printShowRate" />
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-sm-3 control-label">Prompt for type of header (Original / Duplicate)</label>
                    <div class="col-sm-8">
                        <label class="checkbox-inline">
                            <input type="checkbox" ng-model="promptHeaderOriginalDuplicate" />
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <div class="col-sm-offset-3 col-sm-9">
                        <input type="button" class="btn btn-primary" value="Save" ng-click="savePrintConfig();" />
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
<script lang="ja">
    $('.qutoationSettingsTab a').click(function (e) {
        e.preventDefault();
    });
    $('.otherInfoTab a').click(function (e) {
        e.preventDefault();
    });
</script>
