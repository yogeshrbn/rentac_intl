<div class="">

    <!--<pageheader heading="Issue Items" />-->
    <div class="alert alert-success hide" ng-show="Ledgers.length==null">
        {{Message.NoCompaniesFound}}
    </div>
    <div class="col-sm-12">

        <div id="workOrderInfo">
            <form id="form-workorder" method="post" class="">
                <div ng-if="WorkOrder.SiteInfo.SiteId==0">
                <div class="form-group">

                    <div class="col-sm-7">
                        <div class="col-sm-3">
                            <label class="vcenter">Party</label>
                        </div>

                        <div class="col-sm-5">

                            <searchabletext ng-id="client" data-item="Ledger" tab-index="1" selected-object="LedgerSelect" name="client_value" field-required="true"> </searchabletext>

                        </div>
                        <div class="col-sm-1">
                            <label class="vcenter">Date</label>
                        </div>
                        <div class="col-sm-3">
                            <datepicker date-format="dd/MM/yyyy">
                                  <input ng-model="WorkOrder.WorkOrderDate" tabindex="2" type="text" class="form-control"  name="val_workOrderDate"/>
                                </datepicker>
                            <!--<input type="date" name="val_workOrderDate" ng-model="WorkOrder.WorkOrderDate" class="form-control" required />-->
                        </div>

                    </div>
                    <div class="col-sm-5">
                        <span class="col-sm-4">
                            <label class="vcenter">JobNumber</label>
                        </span>
                        <div class="col-sm-8">
                            <input type="text" ng-model="WorkOrder.Number" tabindex="3" class="form-control" name="val_workOrderNumber" required />
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <div class="col-sm-7">
                        <div class="col-sm-3">
                            <label class="vcenter">Site</label>
                        </div>

                        <div class="col-sm-9">
                            <input type="text" ng-model="WorkOrder.SiteInfo.Site" tabindex="4" class="form-control" name="site_name" required />
                        </div>
                    </div>
                    <div class="col-sm-5">
                        <div class="col-sm-4 ">
                            <label class="vcenter">Amount</label>
                        </div>
                        <div class="col-sm-8">
                            <input type="text" ng-model="WorkOrder.ClientAmount" class="form-control maskednumber" name="val_clientAmount" required />
                        </div>
                    </div>
                </div>
                <div class="form-group">

                    <div class="col-sm-7">
                        <div class="col-sm-3">

                            <label class="vcenter">Shaft Size</label>
                        </div>
                        <div class="col-sm-3">
                            <input type="text" ng-model="WorkOrder.SiteInfo.ShaftSize" class="form-control" name="shaft_size" required />
                        </div>

                      
                            <div class="col-sm-3 ">
                                <label class="vcenter">Shaft Height</label>
                            </div>
                            <div class="col-sm-3">
                                <input type="text" ng-model="WorkOrder.SiteInfo.ShaftHeight" class="form-control" name="shaft_height" required />
                            </div>


                         
                    </div>
                    <div class="col-sm-5">
                        <span class="col-sm-4">
                            <label class="vcenter">Site Eng.</label>
                        </span>
                        <div class="col-sm-8">
                            <input type="text" ng-model="WorkOrder.SiteInfo.SiteEng" class="form-control" name="shaft_size" required />
                        </div>
                    </div>

                </div>
                    </div>
                <div class="col-sm-12">
                    <div class="clearfix">&nbsp;</div>
                    <div class="row addWithTable" style="height: 240px; overflow-y: auto;">

                        <div class="col-sm-12 addItemBox">
                            <div class="col-sm-3">
                                <label>
                                    Product
                                </label>
                                <searchabletext ng-id="itemSelect" tab-index="5" data-item="Product" selected-object="selectedProduct"> </searchabletext>
                            </div>
                            <div class="col-sm-3">
                                <label>
                                    Quantity
                                </label>
                                <input type="text" class="form-control" tabindex="6" ng-model="IssueItem.PurchaseQty" />
                            </div>
                            <div class="col-sm-3">
                                <label>
                                    Rate
                                </label>
                                <input type="text" class="form-control" tabindex="7" ng-model="IssueItem.Rate" />
                            </div>
                            <div class="col-sm-2">
                                <label class="col-sm-12">&nbsp; </label>
                                <input type="button" class="btn btn-primary" tabindex="8" value="Add" ng-click="addItem();" />
                            </div>
                        </div>
                        <table class="table table-condensed table-responsive tableInput" med-key ng-delete="DeleteItem(index)">

                            <tr class="headerRow">
                                <th style="width: 15px;">#</th>
                                <th>Item</th>

                                <!--     <th>Size</th>-->
                                <th>Qty</th>
                                <th>Rate</th>
                                <!--<th>Total</th>-->
                                <th width="150px">Amount</th>
                            </tr>
                            <tr ng-repeat="item in WorkOrder.Items" ng-delete="DeleteItem(index);">
                                <td style="width: 30px; vertical-align: middle; text-align: center; background: #e4e4e4; font-weight: bold;">{{$index+1}}
                                </td>
                                <td>{{item.Item.Name}}
                                </td>

                                <td>{{item.PurchaseQty}}

                                </td>
                                <td>{{item.Rate}}
                                </td>

                                <td class="text-right">{{item.PurchaseQty * item.Rate |number:2  }}

                                </td>
                            </tr>

                        </table>

                    </div>

                    <div class="row">
                        <div class="col-sm-9 siteBox">

                            <div class="col-sm-6">
                                <div class="col-sm-12">
                                    <label class="col-sm-4 vcenter">Start Date</label>
                                    <div class="col-sm-8">
                                        <input ng-model="WorkOrder.SiteInfo.StartDate" tabindex="2" type="date" class="form-control" />
                                    </div>
                                </div>

                                <div class="col-sm-12" ng-if="WorkOrder.SiteInfo.SiteId==0">
                                    <label class="col-sm-4 vcenter">Duration(Days)</label>
                                    <div class="col-sm-8 ">
                                        <input type="number" class="form-control" ng-model="WorkOrder.SiteInfo.Duration" />

                                    </div>
                                </div>
                                <div class="clearfix">&nbsp;</div>
                                <div class="col-sm-12">
                                    <input type="button" style="width: 100px;" class="btn btn-primary" ng-show="WorkOrder.Items.length >0 ? true : false " value="Save" ng-click="Save();" />
                                </div>
                            </div>


                            <div class="col-sm-6" ng-show="WorkOrder.SiteInfo.SiteId==0">
                                <div class="col-sm-12">
                                    <label class="col-sm-3 vcenter">W. Doc</label>
                                    <div class="col-sm-5 input-group">

                                        <span class="input-group-btn">
                                            <input type="text" class="form-control" value="{{SitePic}}" disabled />
                                            <label class="btn btn-primary" type="button">
                                                <i class="fa fa-folder-open" aria-hidden="true"></i>Select File
                                                    <input type="file" id="fileSitePic" file style="display: none;" ng-model="SitePic" />
                                            </label>
                                        </span>

                                    </div>



                                </div>
                                <div class="col-sm-12">
                                    <label class="col-sm-3 vcenter">Doc-1</label>
                                    <div class="col-sm-5 input-group">

                                        <span class="input-group-btn">
                                            <input type="text" class="form-control" value="{{Doc1}}" disabled />
                                            <label class="btn btn-primary" type="button">
                                                <i class="fa fa-folder-open" aria-hidden="true"></i>Select File
                                                    <input type="file" id="Doc1" file style="display: none;" ng-model="Doc1" />
                                            </label>
                                        </span>

                                    </div>
                                </div>
                                <div class="col-sm-12">
                                    <label class="col-sm-3 vcenter">Doc-2</label>
                                    <div class="col-sm-5 input-group">

                                        <span class="input-group-btn">
                                            <input type="text" class="form-control" value="{{Doc2}}" disabled />
                                            <label class="btn btn-primary" type="button">
                                                <i class="fa fa-folder-open" aria-hidden="true"></i>Select File
                                <input type="file" id="Doc2" file style="display: none;" ng-model="Doc2" />
                                            </label>
                                        </span>

                                    </div>
                                </div>
                                <div class="col-sm-12">
                                    <label class="col-sm-3 vcenter">Doc-3</label>
                                    <div class="col-sm-5 input-group">

                                        <span class="input-group-btn">
                                            <input type="text" class="form-control" value="{{Doc3}}" disabled />
                                            <label class="btn btn-primary" type="button">
                                                <i class="fa fa-folder-open" aria-hidden="true"></i>Select File
                                <input type="file" id="Doc3" file style="display: none;" ng-model="Doc3" />
                                            </label>
                                        </span>

                                    </div>
                                </div>
                            </div>

                        </div>
                        <div class="col-sm-3">
                            <table class="table  table-responsive text-bold">
                                <tr>
                                    <td class="text-right">SubTotal</td>
                                    <td class="text-right" width="80px">{{ SubTotal(0)|number:2}}</td>
                                </tr>
                                <tr>

                                    <td class="text-right">Freight</td>
                                    <td class="text-right" width="150px">
                                        <input type="text" class="form-control maskednumber text-right" ng-model="WorkOrder.SiteInfo.Freight" />
                                    </td>
                                </tr>
                                <!--  <tr ng-repeat="tax in WorkOrder.Taxes">

                                    <td class="text-right">
                                        <input type="checkbox" ng-model="tax.Applicable" />
                                        {{tax.Name}}({{tax.Rate  |number:2 }}%)</td>
                                    <td class="text-right" width="100px">{{tax.Applicable && (WorkOrder.SubTotal1  * tax.Rate/100.00) || 0 |number:2}}</td>
                                </tr>-->

                                <tr>

                                    <td class="text-right">Total</td>
                                    <td class="text-right" width="150px">{{ SubTotal(1)|number:2}}</td>
                                </tr>
                            </table>

                        </div>


                    </div>

                </div>
            </form>
        </div>





    </div>
    <script lang="ja">
        $('.tabContainer a').click(function (e) {
            e.preventDefault();
        });

    </script>
</div>
