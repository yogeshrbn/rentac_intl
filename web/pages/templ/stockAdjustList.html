<div class="clearfix">&nbsp;</div>






<!-- <div class="alert alert-success" ng-show="Companies.length==null">

</div>-->
<div class="col-lg-12">
    <div class="row">
        <form id="frmStockAdjustList" method="post" class="">
            <div class="col-sm-2">

                <label>From</label>

                <datepicker date-format="dd/MM/yyyy">
                    <input ng-model="Filter.From" type="text" tabindex="2" class="form-control" name="val_fromDate" />
                </datepicker>
            </div>
            <div class="col-sm-2">

                <label>To</label>
                <datepicker date-format="dd/MM/yyyy">
                    <input ng-model="Filter.To" type="text" tabindex="3" class="form-control" name="val_toDate" />
                </datepicker>

            </div>

            <div class="col-sm-8">
                <label class="col-sm-12 hidden-xs">&nbsp;</label>
                <div class="d-flex col-sm-12" style="align-items:center;justify-content:space-between;padding-left:0px;">
                    <div class="d-flex" style="align-items:center;justify-content:space-between;">
                        <!--<label class="col-sm-12">&nbsp;</label>-->
                        <input type="button" class="btn btn-primary" tabindex="4" value="Search" ng-click="filter();" />&nbsp;
                        <a href="#stockadjust" class="btn btn-primary" ng-show="AccessData.Add">New </a>

                    </div>
                    <div>
                        <export data="AjustList" url="'stockAdjustList.html'"></export>
                    </div>
                </div>

            </div>
        </form>
    </div>
    <div class="clearfix"></div>
    <div class="table-responsive" style="margin-top:7px;">
        <table class="table table-condensed ">

            <tr class="headerRow">
                <th style="width:50px;" class="text-center">S.No</th>
                <th style="width: 80px;">Date</th>
                <th style=" width: 100px;">Reason</th>

                <th style="width: 70px;">Ref. Number</th>
                <th style="width: 150px;">Remarks</th>
                <th style="width: 150px;">Created By</th>

                <th style=" width: 90px;">Created Time</th>
                <th style=" width: 70px;" class="text-center">Actions</th>

            </tr>
            <tr ng-if="AjustList.length == 0">
                <td colspan="7" class="nodatafound">No data(s) found!</td>
            </tr>
            <tr ng-repeat="item in AjustList">
                <td class="text-center">{{$index + 1 }}</td>
                <td>

                    {{item.PostingDate |date: 'dd-MM-yyyy'}}

                </td>

                <td>{{item.PostingTypeName }}</td>
                <td>{{item.VoucherId }}</td>
                <td>{{item.Remarks }}</td>
                <td>
                    {{item.CreatedByName}}
                </td>



                <td>
                    {{item.CreatedOn |date: 'dd-MM-yyyy HH:mm'}}
                </td>
                <td class="text-center">
                    <div class="btn-group">
                        <i class="fa fa-cog fa-2x text-primary" data-toggle="dropdown" aria-haspopup="true" aria-expanded="true"></i>
                        <ul class="dropdown-menu dropdown-menu-right">
                            <li>
                                <a ng-click="edit(item)" ng-show="AccessData.Edit"><i class="fa fa-edit text-primary fa-2x"></i>Edit</a>

                            </li>
                            <li>  <a ng-click="delete(item)"><i class="fa fa-trash text-danger fa-2x"></i>Delete</a>
                        </ul>
                    </div>


                </td>
            </tr>
        </table>
    </div>
    <script lang="ja">
        $('table a').click(function (e) {
            alert(e);
            e.preventDefault();

        });
    </script>
</div>
