<!--<pageheader heading="Issued Register" />-->
<div class="col-sm-12">

    <div class="col-sm-3">
        <label>Choose Party</label>
      <!--  <searchabletext ng-id="client" data-item="Client" data-all="true" selected-object="LedgerSelect" name="client_value" field-required="true"> </searchabletext>-->
           <searchableselect name="client"  tabindex="2" data-field="Accounts" ng-model="Filter.LedgerId" data-val="LedgerId" data-text="Name" description-field="Code"></searchableselect>
    </div>

    <div class="col-sm-2 text-center">

        <label>From</label>

        <datepicker date-format="dd/MM/yyyy">
      <input ng-model="Filter.From" type="text" class="form-control" />
    </datepicker>
    </div>

    <div class="col-sm-2 text-center">

        <label>To</label>
        <datepicker date-format="dd/MM/yyyy">
      <input ng-model="Filter.To" type="text" class="form-control"/>
    </datepicker>

    </div>
    <div class="col-sm-2 text-center">

        <label>Site</label>

        
      <input ng-model="Filter.Site" type="text" class="form-control" />
     
    </div>
    <div class="col-sm-1">
        <label>&nbsp;</label>
        <input type="button" class="btn btn-primary" value="Seach" ng-click="getList();" />

    </div>
    <div class="col-sm-1">
        <label>&nbsp;</label>
        <a href="#/challanEntry" class="btn btn-primary" ng-show="AccessData.Add">New Challan</a>
    </div>

</div>

<div class="form-group">



    <!-- <div class="alert alert-success" ng-show="Companies.length==null">
        
    </div>-->
    <div class="col-lg-12">

        <table class="table table-condensed table-responsive" med-key>

            <tr class="headerRow">
                <th style="width: 50px;">#</th>
                <th style="width: 100px;">Date</th>
                <th style="width: 100px;">Ch#</th>
                <th style="width: 250px;">Party</th>


                <th style="width: 200px;">Site</th>
                <th style="text-align: right; width: 50px;">Print</th>

            </tr>
            <tr ng-if="Challans.length == 0">
                <td colspan="6" class="nodatafound">No Challan(s) found!</td>
            </tr>
            <tr ng-repeat="item in Challans">
                <td>{{$index + 1}}</td>
                <td>{{item.WorkOrderDate |date: 'dd-MM-yyyy'}}</td>
                <td>{{item.Number }}</td>
                <td>{{item.Client}}
                </td>


                <td>{{item.Site }}</td>
                <td class="text-right">
                    <a href="#/challanEntry?wId={{item.WorkOrderId}}&edit=true"><span class="fa fa-edit text-primary"></span></a>
                    <span class="fa fa-file-pdf-o text-danger" title="Export to pdf" ng-click="PrintReceipt(item,$event);"></span></td>
            </tr>

        </table>

    </div>
</div>
