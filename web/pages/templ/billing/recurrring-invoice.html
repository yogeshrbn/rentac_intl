<div class="">

    <!--<pageheader heading="Issue Items" />-->
    <div class="alert alert-success hide" ng-show="Ledgers.length==null">
        {{Message.NoCompaniesFound}}
    </div>
    <div class="col-sm-12">

        <div id="workOrderInfo">
            <form id="frmPurchase" name="frmPurchase" method="post" class="">
                <div class="col-sm-12">
                    <div class="col-sm-4">
                        <div class="form-group">
                            <div class="col-sm-4">
                                <label class="vcenter">Party</label>
                            </div>

                            <div class="col-sm-8">

                                <!--<searchabletext ng-id="client" search-fields="Name" local-data="SundryDebtors" tab-index="1" selected-object="LedgerSelect" name="client_value" field-required="true"> </searchabletext>-->
                                <searchableselect ng-name="val_party" ng-id="val_party" tabindex="2" data-field="SundryDebtors"
                                                  ng-model="Trans.LedgerId" data-val="LedgerId" data-text="Name"></searchableselect>
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-4">
                        <div class="form-group">
                            <div class="col-sm-4">
                                <label class="vcenter">Bill Date</label>
                            </div>
                            <div class="col-sm-8">
                                <datepicker date-format="dd/MM/yyyy">
                                    <input ng-model="Trans.InvoiceDate" tabindex="2" type="text" class="form-control" name="val_partyBillDate" />
                                </datepicker>
                                <!--<input type="date" name="val_workOrderDate" ng-model="WorkOrder.WorkOrderDate" class="form-control" required />-->
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-4">
                        <div class="form-group">
                            <div class="col-sm-4 ">
                                <label class="vcenter">Invoice #</label>
                            </div>
                            <div class="col-sm-8">
                                <input type="text" class="form-control" tabindex="6" ng-model="Trans.InvoiceNumber" maxlength="30" />
                            </div>
                        </div>
                    </div>

                </div>
                <div class="col-sm-12">
                    <div class="col-sm-4">
                        <div style=" display: flex; flex-direction: column;">
                            <div class="form-group">

                                <div class="col-sm-4">
                                    <label class="vcenter">Ship To</label>
                                </div>
                                <div class="col-sm-8">
                                    <searchableselect ng-id="val_site" ng-name="val_site" ng-model="Trans.LedgerSiteId" data-field="LedgerSites" tab-index="1" data-val="LedgerSiteId"
                                                      data-text="SiteAddress"></searchableselect>
                                </div>
                            </div>
                            <div class="form-group">

                                <div class="col-sm-4">
                                    <label class="vcenter">Start On</label>
                                </div>
                                <div class="col-sm-6">
                                    <datepicker date-format="dd/MM/yyyy" date-min-limit="{{MaxDate}}" >
                                        <input ng-model="Trans.StartsOn" tabindex="2" type="text" class="form-control" name="val_partyBillDate" />
                                    </datepicker>
                                </div>
                            </div>
                            <div class="form-group">

                                <div class="col-sm-4">
                                    <label class="vcenter">Ends On</label>
                                </div>
                                <div class="col-sm-6">
                                    <datepicker date-format="dd/MM/yyyy" date-min-limit="{{MaxDate}}"  >
                                        <input ng-model="Trans.EndsOn" tabindex="2" type="text" class="form-control" name="val_partyBillDate" />
                                    </datepicker>
                                    <div class="checkbox-inline">
                                        <input type="checkbox" ng-model="Trans.NeverExpire"/> Never Expires
                                    </div>
                                </div>
                            </div>
                        </div>
                     
                      
                    </div>
                    <div class="col-sm-4">
                        <div class="form-group">
                            <div class="col-sm-4">
                                <label class="vcenter">OR</label>
                            </div>
                            <div class="col-sm-8">
                                <textarea class="form-control" style="height:80px;width:100%;" maxlength="300"  ng-model="Trans.ShipTo">
                                </textarea>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-sm-12">
                    <div class="clearfix">&nbsp;</div>
                    <div class="row addWithTable" style="height: 290px; overflow-y: auto;border: solid 1px #a5b0b5 ">

                        <div class="col-sm-12 addItemBox">
                            <div class="col-sm-3">
                                <label>
                                    Product
                                </label>
                                <searchabletext ng-id="itemSelect" local-data="AllSizes" title-field="Name" name="Name" search-fields="Name,Code"
                                                selected-object="selectedProduct" data-entry="1"> </searchabletext>
                            </div>
                            <div class="col-sm-1">
                                <label>
                                    Quantity
                                </label>
                                <input type="number" class="form-control" tabindex="6" ng-model="TransItem.Quantity"
                                       max="999999999" />
                            </div>
                            <div class="col-sm-1">
                                <label>
                                    Height
                                </label>
                                <input type="number" class="form-control" tabindex="6" ng-model="TransItem.Height"
                                       max="999999999" />
                            </div>
                            <div class="col-sm-1">
                                <label>
                                    Width
                                </label>
                                <input type="number" class="form-control" tabindex="6" ng-model="TransItem.Width"
                                       max="999999999" />
                            </div>
                            <div class="col-sm-1">
                                <div class="form-group">
                                    <label class="col-sm-10">
                                        Area
                                    </label>
                                    <label class="col-sm-10 text-center">
                                        {{TransItem.Height * TransItem.Width }}
                                    </label>
                                </div>
                            </div>
                            <div class="col-sm-2">
                                <label>
                                    Rate/Area Unit
                                </label>
                                <input type="number" class="form-control" tabindex="7" ng-model="TransItem.Rate" max="999999999" />
                            </div>
                            <div class="col-sm-2">
                                <label class="col-sm-12">&nbsp; </label>
                                <!--<input type="button" class="btn btn-primary" tabindex="8" value="Add" ng-click="addItem();" ng-show="AccessData.Add" />-->
                                <button class="btn btn-primary" value="Add" ng-keydown="addItem($event);" stopfocus="true" ng-click="addItem();" ng-show="AccessData.Add">Add</button>
                            </div>
                        </div>
                        <table class="table table-condensed table-responsive tableInput" med-key ng-delete="DeleteItem(index)">
                            <tr class="headerRow">
                                <th style="width: 25px;">#</th>
                                <th style="width: 250px;">Item</th>
                                <th style="width: 250px;">Description</th>
                                <!--     <th>Size</th>-->
                                <th style="width: 80px;">Qty</th>
                                <th style="width: 80px;">Height</th>
                                <th style="width: 80px;">Width</th>
                                <th style="width: 80px;">Rate</th>
                                <th style="width: 80px;">Tax</th>
                                <!--<th>Total</th>-->
                                <th width="100px">Amount</th>
                            </tr>
                            <tr ng-repeat="item in Trans.Items" ng-delete="DeleteItem(index);" ng-class="item.GroupItemId > 0 ? 'groupitem':'' ">
                                <td style="width: 30px; vertical-align: middle; text-align: center; background: #e4e4e4; font-weight: bold;">
                                    {{
$index+1
                                    }}
                                </td>
                                <td>
                                    <span style="padding-left: 20px" ng-if="item.GroupItemId > 0 "></span>{{item.Item}}

                                </td>

                                <td>

                                    <textarea class="form-control" style="height:50px;" stopfocus="true" maxlength="500" ng-model="item.Description" />

                                </td>
                              

                                <td>


                                    <input type="text" class="form-control maskednumber" maxlength="8" ng-model="item.Quantity" />
                                </td>
                                <td>


                                    <input type="text" class="form-control maskednumber" maxlength="8" ng-model="item.Height" />
                                </td>
                                <td>


                                    <input type="text" class="form-control maskednumber" maxlength="8" ng-model="item.Width" />
                                </td>
                                <td>
                                    <!--{{item.Rate}}-->
                                    <input type="text" class="form-control maskednumber" maxlength="8" ng-model="item.Rate" />
                                </td>
                                <td> {{item.TaxName}}</td>
                                <td class="text-right">
                                    {{item.SubTotal |number:2  }}

                                </td>
                            </tr>
                            <tr ng-if="Trans.Items.length==0">
                                <td colspan="9" class="text-center text-info"><h5>No Items added.</h5></td>
                            </tr>
                        </table>

                    </div>

                    <div class="row">
                        <div class="col-sm-7 siteBox">
                            <ul class="nav nav-tabs" role="tablist">
                                <!--<li role="presentation" class="active"><a href="#otherInfo" aria-controls="otherInfo" role="tab" data-toggle="tab">Other Info</a></li>-->
                                <li role="presentation">
                                    <a href="#otherCharges" aria-controls="otherCharges" role="tab" data-toggle="tab">Other Charges</a>
                                </li>
                                <li role="presentation">
                                    <a href="#settings" aria-controls="settings" role="tab" data-toggle="tab">Settings</a>
                                </li>
                            </ul>
                            <div class="tab-content" style="border: solid 1px #c0c0c0;padding:8px; ">

                                <!--<div role="tabpanel" class="tab-pane active" id="otherInfo">
                                    <div class="row">
                                        <div class="col-sm-12">
                                            <h5 style="font-weight: bold;border-bottom:solid 1px #cdcdcd; display: flex; align-items: flex-end; justify-content: space-between; padding: 5px;">
                                                Additional Information
                                                <a href="javascript:void()" data-toggle="modal" data-target="#modal_addInfo">
                                                    <i class="fa fa-edit text-success"></i>
                                                </a>
                                            </h5>
                                            <div ng-bind-html="AddInfo">
                                            </div>


                                        </div>
                                    </div>

                                    <div class="row">
                                        <div class="col-sm-12" ng-model="condtions">

                                            <h5 style="font-weight: bold;border-bottom:solid 1px #cdcdcd; display: flex; align-items: flex-end; justify-content: space-between; padding: 5px;">
                                                Terms and Conditions
                                                <a href="javascript:void()" data-toggle="modal" data-target="#modal_tnc">
                                                    <i class="fa fa-edit text-success"></i>
                                                </a>
                                            </h5>
                                            <div ng-bind-html="qtnc">
                                            </div>

                                        </div>
                                    </div>
                                </div>-->
                                <div role="tabpanel" class="tab-pane active" id="otherCharges">
                                    <div class="row">
                                        <div class="col-sm-12">
                                            <table class="table table-condensed">
                                                <tr class="headerRow">
                                                    <th class="text-center">S.No</th>
                                                    <th>Charge</th>
                                                    <th class="text-right" style="width:100px;">Amount</th>
                                                </tr>
                                                <tr class="">
                                                    <td class="text-center" style="width:40px;">1</td>
                                                    <td class="headerRow">Loading Charges</td>
                                                    <td>
                                                        <input type="text" ng-model="Trans.Charge1" class="form-control maskednumber" />
                                                    </td>
                                                </tr>
                                                <tr>
                                                    <td class="text-center">2</td>
                                                    <td class="headerRow">Un-loading Charges</td>
                                                    <td>
                                                        <input type="text" ng-model="Trans.Charge2" class="form-control maskednumber" />
                                                    </td>
                                                </tr>
                                                <tr>
                                                    <td class="text-center">3</td>
                                                    <td class="headerRow">Installation Charges</td>
                                                    <td>
                                                        <input type="text" ng-model="Trans.Charge3" class="form-control maskednumber" />
                                                    </td>
                                                </tr>
                                                <tr>
                                                    <td class="text-center">4</td>
                                                    <td class="headerRow">Un-installation Charges</td>
                                                    <td>
                                                        <input type="text" ng-model="Trans.Charge4" class="form-control maskednumber" />
                                                    </td>
                                                </tr>
                                                <tr>
                                                    <td class="text-center">5</td>
                                                    <td class="headerRow">Other Charges</td>
                                                    <td>
                                                        <input type="text" ng-model="Trans.Charge5" class="form-control maskednumber" />
                                                    </td>
                                                </tr>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                                <div role="tabpanel" class="tab-pane" id="settings">
                                    <div class="row">
                                        <div class="col-sm-7">


                                            <input type="checkbox" ng-model="ApplyFreightGST" /> <label>Apply GST On Freight</label><br />
                                            <input type="checkbox" ng-model="ApplyOtherChargeGST" /> <label>Apply GST On Other Charges</label>



                                        </div>
                                    </div>
                                </div>
                            </div>


                            <div class="clearfix">&nbsp;</div>
                            <div class="col-sm-12">
                                <input type="button" style="width: 100px;" class="btn btn-default" ui-sref="billList" value="Cancel" />

                                <input type="button" style="width: 100px;" class="btn btn-primary" ng-show="AccessData.Add ? true : false " value="Save" ng-click="Save();" />

                            </div>
                        </div>
                        <div class="col-sm-5 nopadding">
                            <table class="table  table-responsive text-bold">
                                <tr>
                                    <td class="text-right">SubTotal</td>
                                    <td class="text-right" width="80px">
                                        {{ SubTotal(0) |number:2}}
                                    </td>
                                </tr>
                                <tr>
                                    <td class="text-right">Freight</td>
                                    <td class="text-right" width="80px">
                                        <input type="text" ng-model="Trans.Freight" class="form-control maskednumber" />
                                    </td>
                                </tr>
                                <tr>
                                    <td class="text-right">Freight Tax</td>
                                    <td class="text-right" width="80px">
                                        {{Trans.FreightTax}}
                                    </td>
                                </tr>
                                <tr>
                                    <td class="text-right">Charges Tax</td>
                                    <td class="text-right" width="80px">
                                        {{Trans.ChargesTax}}
                                    </td>
                                </tr>
                                <tr>
                                    <td>
                                        <div class="form-horizontal">
                                            <div class="form-group" style="margin-bottom:0px;">
                                                <label for="inputEmail3" class="col-sm-4 control-label">
                                                    Discount
                                                </label>
                                                <div class="col-sm-8">
                                                    <div class="input-group">
                                                        <input type="text" class="form-control maskednumber" max="100" ng-model="Trans.DiscountValue" placeholder="">
                                                        <div class="input-group-btn">
                                                            <button class="btn btn-default" type="button">%</button>
                                                            <!--<button class="btn btn-default" type="button">Fixed</button>-->
                                                        </div>
                                                    </div>
                                                </div>
                                                <!--<div class="col-sm-10 pull-right">
                                                    <span class="label label-default">New</span>
                                                </div>-->
                                            </div>
                                        </div>
                                    </td>
                                    <td class="text-right">
                                        {{Trans.DiscountAmount | number:2}}


                                    </td>
                                </tr>
                                <tr>
                                    <td class="text-right">
                                        IGST
                                    </td>
                                    <td class="text-right">{{Trans.Items|sum:'IGST' |number:2}}</td>
                                </tr>
                                <tr>
                                    <td class="text-right">
                                        CGST
                                    </td>
                                    <td class="text-right">{{Trans.Items|sum:'CGST' |number:2}}</td>
                                </tr>
                                <tr>
                                    <td class="text-right">
                                        SGST
                                    </td>
                                    <td class="text-right">{{Trans.Items|sum:'SGST' |number:2}}</td>
                                </tr>
                                <tr>
                                    <td class="text-right text-bold">
                                        <label class="control-label">
                                            Total
                                        </label>
                                    </td>
                                    <td class="text-right" width="150px">
                                        {{Trans.Total |number:2}}
                                    </td>
                                </tr>
                            </table>
                        </div>
                    </div>
                </div>
            </form>
        </div>

    </div>
    <script lang="ja">
        $('.tabContainer a').click(function (e) {
            e.preventDefault();
        });
        $('.nav a').click(function (e) {
            e.preventDefault();
        });
    </script>

</div>
