<div class="form-group">
     
    <!--   <pageheader heading="Item Category List" />-->
    <div class="col-lg-12">
        <!--<h3>Product Category list</h3>-->
        <a href="#prodcat" class="btn btn-primary">New Item Category</a>
    </div>
    <div class="clearfix">&nbsp;</div>
   <!-- <div class="alert alert-success" ng-show="Categories.length==null">
        {{Message.NOCATEGORIESFOUND }} 
    </div>-->
    <div class="col-lg-12">

              <table class="table table-condensed table-responsive" med-key>
            <tr class="filterRow hidden-xs">
                <th>
                    <input type="text" class="form-control" tabindex="1" placeholder="Find by code" ng-model="search.Name" />
                </th>
                <th>
                    <input type="text" class="form-control" tabindex="2" placeholder="Find by name" ng-model="search.Address1" /> 
           <!--         <input type="button" value="Find" class="btn btn-primary" ng-click="Find();" />-->
                    <!--<input type="button" value="Advance Filter" class="btn btn-primary" />-->
                </th>
               
            </tr>
               <tr class="headerRow">
                <th>Category</th>
                <th>Actions</th>


            </tr>
            <tr ng-repeat="item in Categories">
                <td>{{item.Name}}
                </td>

                <td>
                    <a href="#prodcat?cId={{item.CategoryId}}"><span class="fa fa-edit text-primary"></span></a>&nbsp;&nbsp;
                   <a ng-show="{{item.Status}}==1" ng-click="Activate(2,item.CategoryId);"><span class="fa fa-trash text-danger"></span></a>
                    <a ng-show="{{item.Status}}==2" ng-click="Activate(1,item.CategoryId);"><span class="fa fa-check text-primary"></span></a>
                </td>
            </tr>

        </table>

    </div>

</div>
