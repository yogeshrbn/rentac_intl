<div class="clearfix">&nbsp;</div>
<form id="form-receipt" method="post" class="form-horizontal">

    <!-- <pageheader heading=" {{TranType == 1 ? 'Cash Receipt': 'Cash Payment' }}" />-->
    <div class="col-sm-6">
        <div class="col-sm-8">
            <div class="form-group">
                <label class="col-sm-3 control-label">
                    Party
                </label>
                <div class="col-sm-9">

                    <searchableselect name="client" tabindex="2" data-primarytext="TradeName" ng-disabled="{{Trans.LedgerTransactionId > 0 ? true:null}}" data-field="Accounts" ng-model="Trans.LedgerId" data-val="LedgerId" data-text="Name"></searchableselect>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">
                    Site
                </label>
                <div class="col-sm-9">
                    <searchableselect name="val_site" tabindex="2" data-field="LedgerSites" ng-model="Trans.LedgerSiteId" data-val="LedgerSiteId" data-text="SiteAddress"></searchableselect>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">
                    Date
                </label>
                <div class="col-sm-9">
                    <datepicker date-format="dd/MM/yyyy">
                        <input ng-model="Trans.TransactionDate" type="text" tabindex="1" class="form-control" field-required="true" name="TransactionDate" />
                    </datepicker>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">
                    Mode
                </label>
                <div class="col-sm-9">
                    <!--<input type="text" class="form-control" value="Cash" disabled />-->
                    <div class="radio-inline">
                        <label for="exampleInputName2">
                            <input type="radio" name="txnMode" ng-model="Trans.TransactionMode" ng-value="1" />
                            Cash
                        </label>

                    </div>
                    <div class="radio-inline">
                        <label for="exampleInputName2">
                            <input type="radio" name="txnMode" ng-model="Trans.TransactionMode" ng-value="2" />
                            Online
                        </label>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">
                    Amount
                </label>
                <div class="col-sm-9">
                    <input ng-model="Trans.TransactionAmount" type="text" tabindex="3" class="form-control maskednumber text-right" name="Amount" field-required="true" />
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">
                    A/C<i class="required">*</i>
                </label>
                <div class="col-sm-9">
                    <searchableselect ng-name="val_refedger" tabindex="2" data-field="RefAccounts" ng-model="Trans.RefLedgerId" data-val="LedgerId" data-text="Name"></searchableselect>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">
                    Ref#
                </label>
                <div class="col-sm-9">
                    <input ng-model="Trans.TranRefNumber" type="text" tabindex="4" class="form-control" name="Amount" field-required="true" />
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">
                    Remarks
                </label>
                <div class="col-sm-9">
                    <textarea ng-model="Trans.Narration" style="height:50px;" tabindex="5" class="form-control" name="Remarks" field-required="true" />
                </div>
            </div>
        </div>
        <div class="col-sm-8">
            <div class="form-group">
                <div class="col-sm-9 col-sm-offset-3">
                    
                    <input type="button" class="btn btn-default" tabindex="6" value="Cancel" ng-click="Cancel();" />
                    <input type="button" class="btn btn-primary" tabindex="6" value="Save Entry" ng-click="CreateTransaction();" ng-show="AccessData.Add" />
                    <input type="button" class="btn btn-success pull-right" value="Refund" ng-click="openRefund()" ng-show="AccessData.Add && Trans.EntryType == 27 && Trans.LedgerTransactionId > 0" />
                </div>
            </div>
        </div>
    </div>



    <div class="col-sm-6">

        <!--<div class="col-sm-2">
            <label>Receipt#</label>
            <input type="text" class="form-control" ng-model="CurrentBill.BillNumber" />
        </div>-->

    </div>

    <div class="modal fade" id="refundDialog" tabindex="-1" role="dialog" aria-labelledby="modalLabel" aria-hidden="true">
        <div class="modal-dialog" style="" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                    <h4 class="modal-title" id="modalLabel">Refund Security</h4>
                </div>
                <div class="modal-body" style="padding-bottom:0px;">
                   
                    <div class="row">
                        <div class="col-sm-10">
                            <div class="form-group">
                                <label class="col-sm-3 control-label">
                                    Mode
                                </label>
                                <div class="col-sm-9">
                                    <!--<input type="text" class="form-control" value="Cash" disabled />-->
                                    <div class="radio-inline">
                                        <label for="exampleInputName2">
                                            <input type="radio" name="txnMode" ng-model="RefundTrans.TransactionMode" ng-value="1" />
                                            Cash
                                        </label>

                                    </div>
                                    <div class="radio-inline">
                                        <label for="exampleInputName2">
                                            <input type="radio" name="txnMode" ng-model="RefundTrans.TransactionMode" ng-value="2" />
                                            Online
                                        </label>
                                    </div>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">
                                    Date
                                </label>
                                <div class="col-sm-9">
                                    <datepicker date-format="dd/MM/yyyy">
                                        <input ng-model="RefundTrans.TransactionDate" type="text" tabindex="1" class="form-control" field-required="true" name="refundDate" />
                                    </datepicker>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">
                                    Refund Amount
                                </label>
                                <div class="col-sm-9">
                                    <input ng-model="RefundTrans.TransactionAmount" type="text" tabindex="3" class="form-control maskednumber text-right" name="Amount" field-required="true" />
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">
                                    A/C<i class="required">*</i>
                                </label>
                                <div class="col-sm-9">
                                    <searchableselect ng-name="val_refedger" tabindex="2" data-field="RefAccounts" ng-model="RefundTrans.RefLedgerId" data-val="LedgerId" data-text="Name"></searchableselect>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">
                                    Remarks
                                </label>
                                <div class="col-sm-9">
                                    <textarea ng-model="RefundTrans.Narration" style="height:50px;" tabindex="5" class="form-control" name="Remarks" field-required="true" />
                                </div>
                            </div>
                        </div>
                    </div>
                   
                </div>
                <div class="modal-footer">

                    <button id="btnCancelProfileDialog" type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary btn-sm" ng-click="refund()">Refund</button>

                </div>
            </div>
        </div>
    </div>



</form>
