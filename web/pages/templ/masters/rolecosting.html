<div class="clearfix">&nbsp;</div>
<div class="form-group">
    <div class="col-lg-12">
        <div class="d-flex" style="align-items:center;justify-content:space-between;">
            <div class="d-flex mb-1 mr-1">
                <button ng-click="New()" class="btn btn-primary" ng-show="AccessData.Add" data-toggle="modal" data-target="#addEditRoleCosting">
                    New Role Costing
                </button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-condensed" med-key>
                <tr class="headerRow">
                    <th class="text-center" style="width:50px;">Sr.No</th>
                    <th>Role</th>
                    <th class="text-right">Per Hour Cost</th>
                    <th class="text-right">Per Day Cost</th>
                    <th class="text-center">Actions</th>
                </tr>
                <tr ng-repeat="item in RoleCosts">
                    <td class="text-center">{{$index + 1}}</td>
                    <td>{{item.RoleName}}</td>
                    <td class="text-right">{{item.PerHourCost | number : 2}}</td>
                    <td class="text-right">{{item.PerDayCost | number : 2}}</td>
                    <td class="text-center">
                        <div style="display:flex;justify-content:space-evenly;">
                            <a href="javascript:void" ng-click="edit(item)" ng-show="AccessData.Edit"><i class="fa fa-edit fa-2x"></i></a>
                            <a href="javascript:void" ng-click="delete(item)"><i class="fa fa-trash text-danger fa-2x"></i></a>
                        </div>
                    </td>
                </tr>
            </table>
        </div>

        <div class="modal fade" id="addEditRoleCosting" tabindex="-1" role="dialog" aria-labelledby="modalLabel" aria-hidden="true" style="padding:0px;">
            <div class="modal-dialog" role="document">
                <div class="modal-content">
                    <div class="modal-header">
                        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                            <span aria-hidden="true">&times;</span>
                        </button>
                        <h4 class="modal-title" id="modalLabel">Add/Edit Role Costing</h4>
                    </div>
                    <div class="modal-body" style="padding-bottom:30px;">
                        <div class="row">
                            <div class="col-sm-12">
                                <div class="form-group copayRateFrom">
                                    <label class="col-sm-4">Role</label>
                                    <div class="col-sm-7">
                                        <select class="form-control" ng-model="Model.RoleId" ng-options="r.RoleId as r.Name for r in Roles">
                                            <option value="">Select Role</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="col-sm-12">
                                <div class="form-group copayRateFrom">
                                    <label class="col-sm-4">Per Hour Cost</label>
                                    <div class="col-sm-7">
                                        <input type="number" min="0" step="0.01" class="form-control" ng-model="Model.PerHourCost" />
                                    </div>
                                </div>
                            </div>
                            <div class="col-sm-12">
                                <div class="form-group copayRateFrom">
                                    <label class="col-sm-4">Per Day Cost</label>
                                    <div class="col-sm-7">
                                        <input type="number" min="0" step="0.01" class="form-control" ng-model="Model.PerDayCost" />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
                        <button class="btn btn-primary btn-sm" ng-click="save()">Save</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
