<!-- views/warehouses.html -->

<div class="col-md-12">


    <button class="btn btn-primary pull-right mb-1" ng-click="showAddForm()">
        <i class="fa fa-plus"></i> Create Warehouse
    </button>
    <div class="table-responsive">
        <table class="table table-condensed">

            <tr class="headerRow">
                <th class="text-center">Sr.No</th>
                <th  sort-header="warehouses" sort-field="Name">Name</th>
                <th>Location</th>
                <th  sort-header="warehouses" sort-field="Capacity">Capacity</th>
                <th  sort-header="warehouses" sort-field="StatusId">Status</th>
                <th  sort-header="warehouses" sort-field="CreatedByName">Created By</th>
                <th  sort-header="warehouses" sort-field="CreatedOn">Created Date</th>
                <th class="text-center">Actions</th>
            </tr>

            <tbody>
                <tr ng-repeat="warehouse in warehouses">
                    <td class="text-center">{{$index+1}}</td>
                    <td>{{warehouse.Name}}</td>
                    <td>{{warehouse.Location}}</td>
                    <td>{{warehouse.Capacity}}</td>

                    <td>
                        <span class="label" ng-class="{
                            'label-success': warehouse.StatusId === 1,
                            'label-warning': warehouse.StatusId === 2,
                            'label-danger': warehouse.StatusId === 3
                        }">{{warehouse.StatusName}}</span>
                    </td>
                    <td>{{warehouse.CreatedByName}}</td>
                    <td>{{warehouse.CreatedOn | formatDate}}</td>
                    <td class="table-actions text-center">
                        <!--<button class="btn btn-xs btn-info" ng-click="editWarehouse(warehouse)">Edit</button>-->
                        <a href="javascript:void()" ng-click="editWarehouse(warehouse)"><i class="fa fa-edit fa-2x text-primary"></i></a>
                        &nbsp;
                        <a href="javascript:void()" ng-click="deleteWarehouse(warehouse)"><i class="fa fa-trash fa-2x text-danger"></i></a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Warehouse Modal -->
<div class="modal fade" id="warehouseModal" tabindex="-1" role="dialog">
    <div class="modal-dialog" role="document">
        <div class="modal-content">

            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal">&times;</button>
                <h4 class="modal-title">{{isEditing ? 'Edit' : 'Add'}} Warehouse</h4>
            </div>
            <div class="modal-body">
                <form name="warehouseForm" id="warehouseForm" novalidate ng-submit="saveWarehouse()">
                    <div class="form-group">
                        <label>Name *</label>
                        <input type="text" class="form-control" ng-model="warehouse.Name" name="Name" minlength="3" maxlength="50"
                               ng-class="{'has-error': warehouseForm.Name.$touched && warehouseForm.Name.$invalid}" required>
                    </div>
                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" class="form-control" ng-model="warehouse.Location"
                               minlength="3" maxlength="200" ng-class="{'has-error': warehouseForm.Name.$touched && warehouseForm.Name.$invalid}" required>
                    </div>
                    <div class="form-group">
                        <label>Capacity</label>
                        <input type="number" class="form-control" ng-model="warehouse.Capacity" min="1" max="9999999"
                               ng-class="{'has-error': warehouseForm.Name.$touched && warehouseForm.Name.$invalid}" required>
                    </div>


                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" ng-click="saveWarehouse()">
                    {{isEditing ? 'Update' : 'Save'}}
                </button>
                <button type="button" class="btn btn-default" data-dismiss="modal">Cancel</button>
            </div>
        </div>
    </div>
</div>
