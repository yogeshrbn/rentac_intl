<div class="clearfix">&nbsp;</div>
<div class="form-group">


    <div class="alert alert-success" ng-show="Companies.length==null">
        {{Message.NoCompaniesFound}}
    </div>
    <div class="col-lg-12">
        <div class="d-flex" style="align-items:center;justify-content:space-between;">
            <div class="d-flex mb-1 mr-1">




                <button ng-click="New()" class="btn btn-primary" ng-show="AccessData.Add" data-toggle="modal"
                        data-target="#addEditZone">
                    New Zone
                </button>
            </div>

        </div>
        <div class="table-responsive">
            <table class="table table-condensed " med-key>

                <tr class="headerRow">
                    <th class="text-center" style="width:50px;">Sr.No</th>
                    <th style="width:85%"  sort-header="Zones" sort-field="Name">Name</th>

                    <th class="text-center">Actions</th>

                </tr>
                <tr ng-repeat="item in Zones">
                    <td class="text-center">{{$index+1}}</td>
                    <td>
                        {{item.Name}}
                    </td>

                    <td class="text-center">
                        <div style="display: flex; justify-content: space-evenly;">
                            <a href="javascript:void" ng-click="edit(item);" ng-show="AccessData.Edit">
                                <i class="fa fa-edit fa-2x"></i>
                            </a>
                            <a href="javascript:void" ng-click="delete(item);"><i class="fa fa-trash text-danger fa-2x"></i></a>
                        </div>
                    </td>
                </tr>

            </table>

        </div>
        <div class="modal fade" id="addEditZone" tabindex="-1" role="dialog" aria-labelledby="modalLabel"
             aria-hidden="true" style="padding:0px;">
            <div class="modal-dialog" role="document">
                <div class="modal-content">
                    <div class="modal-header">
                        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                            <span aria-hidden="true">&times;</span>
                        </button>
                        <h4 class="modal-title" id="modalLabel">Add/Edit Zone</h4>
                    </div>
                    <div class="modal-body" style="padding-bottom:30px;">

                        <div class="row">
                            <div class="col-sm-12">
                                <div class="form-group copayRateFrom">
                                    <label class="col-sm-3">Zone Name</label>
                                    <div class="col-sm-6">
                                        <input type="text" maxlength="50" class="form-control" ng-model="Zone.Name" />
                                    </div>
                                </div>
                            </div>

                            <div class="col-sm-12 mt-3">
                                <div class="form-group copayRateFrom">
                                    <label class="col-sm-3">
                                        Localities
                                        <!--<span>
                                        <input type="checkbox" ng-model="CopyRatesModel.CopyToAll"  /> All</span>-->
                                    </label>
                                    <!--<partysites on-selected="onCopyPartySelected(e)" accounts="Accounts"></partysites>-->
                                    <!--<multiselectcheckbox data="Accounts" text="Name" text2="SiteAddress" key="LedgerSiteId"
                                                         selecteddata="copyToSelected"></multiselectcheckbox>-->
                                    <div class="col-sm-9 table-responsive">
                                        <table class="table table-condensed">
                                            <tr class="headerRow">
                                                <th>Locality</th>
                                                <td></td>
                                            </tr>
                                            <tr ng-repeat="l in Zone.Localities | filter:{ Deleted : 0}">
                                                <td>
                                                    {{l.Name}}
                                                </td>
                                                <td>
                                                    <a href="javascript:void"><i class="fa fa-trash fa-2x" ng-click="deleteLocality(l)"></i></a>
                                                </td>
                                            </tr>
                                            <tfoot>
                                                <tr>
                                                    <td style="border-right:none;">
                                                        <input type="text" class="form-control" maxlength="50"
                                                               ng-model="Locality" />

                                                    </td>
                                                    <td style="border-left:none;">
                                                        <button type="button" class="btn btn-primary" ng-click="addLocality()">Add</button>
                                                    </td>
                                                </tr>
                                            </tfoot>
                                        </table>
                                    </div>
                                </div>
                            </div>

                        </div>


                    </div>
                    <div class="modal-footer">

                        <div class="d-flex d-sm-block" style=" justify-content: space-between; flex-direction: row;">

                            <div>
                                <button id="btnCancelProfileDialog" type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>

                                <button class="btn btn-primary btn-sm" ng-click="save()">Save</button>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>


        <script lang="javascript">
            $('.nav a').click(function (e) {
                e.preventDefault();
            });
            $('table').click(function (e) {

                e.preventDefault();

            });
        </script>
    </div>
</div>
