<div class="">

    <!--<pageheader heading="Issue Items" />-->

    <div class="col-sm-12">

        <div id="workOrderInfo">
            <form id="frmStockAdjust" method="post" class="">
                <div class="form-group">

                    <div class="col-sm-3">
                        <!--<div class="col-sm-3">
                            <label class="vcenter">Party</label>
                        </div>

                        <div class="col-sm-5">


                            <searchableselect ng-id="val_party" ng-name="val_party" tabindex="2" data-field="Accounts" ng-model="StockTrans.LedgerId" data-val="LedgerId" data-text="Name"></searchableselect>
                        </div>-->
                        <div class="form-group">
                            <label class="vcenter col-xs-3 control-label">Date<i class="required">*</i></label>


                            <div class="col-sm-8">
                                <datepicker date-format="dd/MM/yyyy">
                                    <input ng-model="StockTrans.PostingDate" tabindex="2" type="text" class="form-control" name="val_workOrderDate" />
                                </datepicker>

                            </div>
                        </div>



                    </div>
                    <div class="col-sm-4">
                        <div class="form-group">
                            <label class="vcenter col-xs-4 control-label">Ref. Number <i class="required">*</i></label>
                            <div class="col-sm-8">
                                <input type="text" ng-model="StockTrans.VoucherId" tabindex="3" class="form-control"
                                       name="val_refNumber" />
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="form-group">
                            <label class="vcenter col-xs-4 control-label">Entry Type <i class="required">*</i></label>
                            <div class="col-sm-8">

                                <select class="form-control" name="val_reason" ng-model="StockTrans.PostingType">
                                    <option value="0">--select reason--</option>
                                    <option value="6">Stock-Out (Repair Job)</option>
                                    <option value="7">Stolen Goods</option>
                                    <option value="8">Damaged Goods</option>
                                    <option value="9">Scrap</option>
                                    <option value="10">Stocktaking Results</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <!--<div class="col-sm-7">
                        <div class="col-sm-3 ">
                            <label class="vcenter">Account</label>
                        </div>

                        <div class="col-sm-5">
                            <searchableselect name="val_bank" on-loaded="bankLoaded();" tabindex="2" data-field="Banks" ng-model="Trans.PurchaseAccountId" data-val="LedgerId" data-text="Name"></searchableselect>
                        </div>
                    </div>-->

                </div>
                <div class="col-sm-12">
                    <div class="clearfix">&nbsp;</div>
                    <div class="row addWithTable" style="height: 240px; margin-bottom:20px; overflow-y: auto; border: solid 1px #a5b0b5; ">

                        <div class="col-sm-12 addItemBox">
                            <div class="col-sm-2">
                                <label>
                                    Product
                                </label>
                                <searchabletext ng-id="itemSelect" local-data="AllSizes" title-field="Product" name="Product" search-fields="Product,Code" selected-object="selectedProduct" data-entry="1" tab-index="5"> </searchabletext>
                            </div>
                            <div class="col-sm-2">
                                <label>
                                    Quantity Ajusted
                                </label>
                                <input type="number" class="form-control" tabindex="6" ng-model="TransItem.Quantity" />
                            </div>

                            <div class="col-sm-1">
                                <label class="col-sm-12">&nbsp; </label>
                                <input type="button" class="btn btn-primary" tabindex="8" value="Add" ng-click="addItem();" ng-show="AccessData.Add" />
                            </div>
                        </div>
                        <table class="table table-condensed table-responsive tableInput"
                               med-key ng-delete="DeleteItem(index)">

                            <tr class="headerRow">
                                <th style="width: 15px;">#</th>
                                <th style="width: 60%;">Item</th>

                                <!--     <th>Size</th>-->
                                <!--<th>Qty Available</th>-->
                                <th>Qty Adjusted</th>
                                <!--<th>Total</th>-->
                                <!--<th width="150px">New Qty Inhand</th>-->

                            </tr>
                            <tr ng-repeat="item in StockTrans.Items | filter: filterDeleted" ng-delete="DeleteItem(index);">
                                <td style="width: 30px; vertical-align: middle; text-align: center; background: #e4e4e4; font-weight: bold;">
                                    {{$index+1}}
                                </td>
                                <td>
                                    {{item.Product}}
                                </td>

                                <!--<td>
                                    {{item.InHandQty}}
                                </td>-->
                                <td>
                                    <input type="number" min="1" ng-model="item.Quantity" class="form-control" />
                                </td>


                                <!--<td class="text-right">
                                    {{item.QtyNow}}
                                </td>-->

                            </tr>

                        </table>


                    </div>

                    <div class="row text-left pl-0" ng-if="edit==false">
                        <button type="button" class="btn btn-primary" ng-click="saveStockAdjust();">Save</button>
                    </div>

                </div>
            </form>
        </div>

    </div>
    <script lang="ja">
        $('.tabContainer a').click(function (e) {
            e.preventDefault();
        });

    </script>
</div>
