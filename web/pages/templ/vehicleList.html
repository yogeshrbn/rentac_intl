<div class="clearfix">&nbsp;</div>
<div class="form-group">
 
    <div class="alert alert-success" ng-show="Companies.length==null">
        {{Message.NoCompaniesFound}}
    </div>
    <div class="col-lg-12">
        <div class="table-responsive">
            <div class="d-flex" style="align-items:center;justify-content:space-between;">
                <div class="d-flex mb-1 mr-1">




                    <button ng-click="New()" class="btn btn-primary" ng-show="AccessData.Add">New Vehicle</button>
                </div>
                <div>
                    <export data="Vehicles" url="'vehicles.html'"></export>
                </div>
            </div>
            <table class="table table-condensed " med-key>
               
                <tr class="headerRow">
                    <th style="width:50px;" class="text-center">S.No</th>
                    <th>Name</th>
                    <th>Reg.Number</th>
                    <th>Chassis Number</th>
                    <th>Engine Number</th>

                    <th class="text-center">Actions</th>

                </tr>
                <tr dir-paginate="item in Vehicles | itemsPerPage: PAGE_SIZE |filter: search:strict">
                    <td class="text-center">{{$index+1}}</td>
                    <td>{{item.Name}}</td>
                    <td>
                        {{item.RegNumber}}
                    </td>
                    <td>{{item.ChachisNumber}}</td>
                    <td>
                        {{item.EngineNumber}}
                    </td>

                    <td class="text-center">
                        <a href="#" ng-click="Edit(item);" ng-show="AccessData.Edit">   <i class="fa fa-edit fa-2x"></i></a>
                       

                    </td>
                </tr>

            </table>
            <dir-pagination-controls></dir-pagination-controls>
        </div>
        <script lang="javascript">
            $('.nav a').click(function (e) {
                e.preventDefault();
            });
            $('table').click(function (e) {

                e.preventDefault();

            });
        </script>
    </div>
</div>
