<div class="clearfix">&nbsp;</div>
<div class="form-group">

   
    <div class="alert alert-success" ng-show="Companies.length==null">
        {{Message.NoCompaniesFound}}
    </div>
    <div class="col-lg-12">
        <div class="d-flex" style="align-items:center;justify-content:space-between;">
            <div class="d-flex mb-1 mr-1">




                <button ng-click="New()" class="btn btn-primary" ng-show="AccessData.Add">New Employee</button>
            </div>
            <div>
                <export data="Employees" url="'employees.html'"></export>
            </div>
        </div>
        <div class="table-responsive">
            <table class="table table-condensed " med-key>
               
                <tr class="headerRow">
                    <th class="text-center" style="width:50px;">Sr.No</th>
                    <th  sort-header="Employees" sort-field="Name">Name</th>
                    <th  sort-header="Employees" sort-field="EmployeeCode">Code</th>
                    <th >Address</th>
                    <th >Phone</th>
                    <th>Aadhar</th>
                    <th  sort-header="Employees" sort-field="RoleName">Role</th>
                    <th  sort-header="Employees" sort-field="StatusName">Status</th>
                    <th class="text-center">Actions</th>

                </tr>
                <tr dir-paginate="item in Employees | itemsPerPage: PAGE_SIZE |filter: search:strict">
                    <td class="text-center">{{$index+1}}</td>
                    <td>
                        {{item.Name}}
                    </td>
                    <td>{{item.EmployeeCode}}</td>
                    <td>
                        {{item.Address}}
                    </td>
                    <td>{{item.Phone}}</td>
                    <td>{{item.Aadhar}}</td>
                    <td>{{item.RoleName}}</td>
                    <td>{{item.StatusName}}</td>
                    <td class="text-center">
                        <a href="#" ng-click="Edit(item);" ng-show="AccessData.Edit">
                            <i class="fa fa-edit fa-2x"></i>
                        </a>
                        <!--<div class="btn-group">
                           
                            <i class="fa fa-chevron-down" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false"></i>
                            <ul class="dropdown-menu dropdown-menu-right">
                                <li><a href="#" ng-click="Edit(item);" ng-show="AccessData.Edit">Edit</a></li>
                                
                            </ul>
                        </div>-->

                    </td>
                </tr>

            </table>
            <dir-pagination-controls></dir-pagination-controls>
        </div>
        <script lang="javascript">
            $('.nav a').click(function (e) {
                e.preventDefault();
            });
            $('table').click(function (e) {

                e.preventDefault();

            });
        </script>
    </div>
</div>
