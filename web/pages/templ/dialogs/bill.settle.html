<md-dialog>
    <md-toolbar>
        <div class="md-toolbar-tools">
            <h2>Settle Bill</h2>
            <span flex></span>
            <md-button class="md-icon-button" ng-click="closeDialog()">

            </md-button>
        </div>
    </md-toolbar>
    <md-dialog-content layout="row" layout-wrap layout-margin >
        <form id="form-employee" method="post" class="form-horizontal form-bordered">
            <div class="form-group">
                <div class="col-sm-12 col-xs-12">
                    <div class="alert alert-info">Enter remarks of settlement of this bill, this will set the bill balance to 0</div>
                    <label>Remarks</label>

                    <textarea  class="form-control" style="width:300px;height:100px;"
                              ng-model="SettlementRemarks" maxlength="200" />

                </div>



            </div>
        </form>
    </md-dialog-content>
    <md-dialog-actions layout="row">
        <div class="pull-right">
            <button ng-click="closeDialog()" class="btn btn-danger" value="Close">Close</button>  <span flex></span>
            <button ng-click="OkButtonClick()" class="btn btn-primary" value="Print">Settle <i class="fa fa-spinner fa-spin hide" style="color:#fff;"></i></button>


        </div>
    </md-dialog-actions>
</md-dialog>
