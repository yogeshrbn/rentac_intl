<md-dialog style="width:50%;">
    <md-toolbar>
        <div class="md-toolbar-tools">
            <h2>Add Edit Vehicle</h2>
            <span flex></span>
            <md-button class="md-icon-button" ng-click="closeDialog()">

            </md-button>
        </div>
    </md-toolbar>
    <md-dialog-content layout="row" layout-wrap layout-margin layout-align="center">
        <form id="form-vehicle" method="post" class="form-horizontal form-bordered">
            <div class="form-group">
                <div class="col-sm-6  col-xs-12">
                    <label>Name</label>
                    <input type="text" class="form-control" name="name" ng-model="Vehicle.Name" maxlength="30" />
                </div>
                <div class="col-sm-6  col-xs-12">
                    <label>Reg. Number</label>
                    <input type="text" class="form-control" name="regNumber" ng-model="Vehicle.RegNumber" maxlength="30" />
                </div>
                <div class="col-sm-6  col-xs-12">
                    <label>Chassis Number</label>
                    <input type="text" class="form-control" name="chachisNumber" ng-model="Vehicle.ChachisNumber" maxlength="30" />
                </div>
                <div class="col-sm-6  col-xs-12">
                    <label>Engine Number</label>
                    <input type="text" class="form-control" name="engineNumber" ng-model="Vehicle.EngineNumber" maxlength="40" />
                </div>



            </div>
        </form>
    </md-dialog-content>
    <md-dialog-actions layout="row">
        <div class="pull-right">
            <button ng-click="closeDialog()" class="btn btn-danger" value="Close">Close</button>
            <span flex></span>
            <button ng-click="OkButtonClick()" class="btn btn-primary" value="Print">Save <i class="fa fa-spinner fa-spin hide" style="color:#fff;"></i></button>


        </div>
    </md-dialog-actions>
</md-dialog>
