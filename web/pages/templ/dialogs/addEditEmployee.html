<md-dialog style="width:50%;" >
    <md-toolbar>
        <div class="md-toolbar-tools">
            <h2>Add Edit Employee</h2>
            <span flex></span>
            <md-button class="md-icon-button" ng-click="closeDialog()">

            </md-button>
        </div>
    </md-toolbar>
    <md-dialog-content layout="row" layout-wrap layout-margin layout-align="center">
        <form id="form-employee" method="post" class="form-horizontal form-bordered" >
            <div class="form-group">
                <div class="col-sm-6 col-xs-12">
                    <label>Name</label>
                    <input type="text" id="val_empName" name="val_empName" class="form-control" ng-model="Employee.Name" maxlength="50" />
                </div>
                <div class="col-sm-6  col-xs-12">
                    <label>Employee Code</label>
                    <input type="text" class="form-control" id="val_empCode" name="val_empCode" ng-model="Employee.EmployeeCode" maxlength="5" />
                </div>
                <div class="col-sm-6  col-xs-12">
                    <label>Address</label>
                    <input type="text" class="form-control" name="val_address" ng-model="Employee.Address" maxlength="50" />
                </div>
                <div class="col-sm-6  col-xs-12">
                    <label>Aadhar No</label>
                    <input type="text" class="form-control"  name="val_aadhar"ng-model="Employee.Aadhar" maxlength="12"/>
                </div>
                <div class="col-sm-6  col-xs-12">
                    <label>Phone</label>
                    <input type="text" class="form-control maskednumber" phoneformat="true" maxlength="10"  name="val_phone" ng-model="Employee.Phone" />
                </div>
                <div class="col-sm-6  col-xs-12">
                    <label>Role</label>
                    <searchableselect name="role" tabindex="2" data-field="Roles" ng-model="Employee.RoleId" data-val="RoleId" data-text="Name"></searchableselect>
                </div>


            </div>
        </form>
    </md-dialog-content>
    <md-dialog-actions layout="row">
        <div class="pull-right">
            <button ng-click="closeDialog()" class="btn btn-danger" value="Close">Close</button>  <span flex></span>
            <button ng-click="OkButtonClick()" class="btn btn-primary" value="Print">Save <i class="fa fa-spinner fa-spin hide" style="color:#fff;"></i></button>


        </div>
    </md-dialog-actions>
</md-dialog>
