<md-dialog style="height:80%;">
    <md-toolbar>
        <div class="md-toolbar-tools">
            <h2>Notify</h2>
            <span flex></span>
            <md-button class="md-icon-button"   ng-click="closeDialog()">
                <i class="fa fa-close fa-2x"></i>
            </md-button>
        </div>
    </md-toolbar>
    <md-dialog-content layout="row" layout-wrap layout-margin layout-align="left" style="min-height:410px;">

        <div class="row" style="width:100%;">
            <form id="frmSendEmailForm" class="form-horizontal">
                <div class="col-sm-12">
                    <p><i class="fa fa-info-circle text-success"></i> Select the modes from below to notify your clients.</p>
                    <ul class="nav nav-pills">
                        <li class="nav-item active">
                            <button class="btn" id="home-tab" data-toggle="tab" ng-click="MailMessage.Type='email'"    data-target="#home">
                                <i class="fa fa-envelope-o"></i>
                                Email
                            </button>
                        </li>
                        <!--<li class="nav-item">
                            <button class="btn nav-link" id="sms-tab"  ng-click="MailMessage.Type='sms'"  data-toggle="tab" data-target="#sms">
                                <i class="fa fa-mobile"></i>SMS
                            </button>
                        </li>-->
                        <li class="nav-item">
                            <button class="btn nav-link" id="whatsapp-tab"  ng-click="MailMessage.Type='whatsapp'"  data-toggle="tab" data-target="#whatsapp">

                                <i class="fa fa-whatsapp"></i>Whatsapp
                            </button>
                        </li>

                    </ul>
                    <hr />
                    <div class="tab-content" id="myTabContent">
                        <div class="tab-pane fade active in" id="home" role="tabpanel" aria-labelledby="home-tab">
                            <div class="col-sm-12">
                                <div class="form-group">
                                    <label class="col-sm-2">To</label>
                                    <div class="col-sm-8">
                                        <input type="text" name="receipients" maxlength="500" ng-model="MailMessage.Receipients" class="form-control" />
                                    </div>
                                </div>
                                <!--<div class="form-group">
                                    <label class="col-sm-2">CC</label>
                                    <div class="col-sm-8">
                                        <input type="text" name="copyTo" maxlength="500" ng-model="MailMessage.CopyTo" class="form-control" />
                                    </div>
                                </div>-->
                                <div class="form-group">
                                    <label class="col-sm-2">Subject</label>
                                    <div class="col-sm-8">
                                        <input type="text" name="subject" maxlength="100" ng-model="MailMessage.Subject" class="form-control" />
                                    </div>
                                </div>
                              
                                <div class="form-group hide">
                                    <label class="col-sm-2">Email Body</label>
                                    <div class="col-sm-8">
                                        <!---->
                                        <textarea ckeditor="editorOptions" name="emailBody" ng-model="MailMessage.Body" data-ck-editor></textarea>
                                    </div>
                                </div>

                            </div>

                        </div>
                        <div class="tab-pane fade" id="sms" role="tabpanel" aria-labelledby="sms-tab">
                            <div class="col-sm-12">
                                <div class="form-group">
                                    <label class="col-sm-2">To</label>
                                    <div class="col-sm-10">
                                        <input type="text" name="receipients" maxlength="10" ng-model="MailMessage.phoneNo" class="form-control maskednumber" phoneformat="true" />
                                        <small>Enter a valid 10 digit phone number</small>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="tab-pane fade" id="whatsapp" role="tabpanel" aria-labelledby="whatsapp-tab">
                            <div class="col-sm-12">
                                <div class="form-group">
                                    <label class="col-sm-2">To</label>
                                    <div class="col-sm-8">
                                        <input type="text" name="receipients" maxlength="10" ng-model="MailMessage.phoneNo" class="form-control maskednumber"   phoneformat="true" />
                                        <small>Enter a valid 10 digit phone number</small>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </form>
        </div>




    </md-dialog-content>
    <md-dialog-actions layout="row">
        <div class="pull-right">
            <button id="btnCancelProfileDialog" type="button" class="btn btn-secondary" ng-click="closeDialog()">Cancel</button>
            <button class="btn btn-primary btn-sm" ng-click="sendNow()">Send Now</button>

        </div>
    </md-dialog-actions>
</md-dialog>
