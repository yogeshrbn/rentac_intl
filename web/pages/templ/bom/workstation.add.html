<div class="clearfix">&nbsp;</div>

<div class="col-lg-6">
    <form class="form-horizontal" id="frmWorkStation" name="frmWorkStation">
        <div class="col-sm-12">
            <div class="form-group">
                <label class="control-label col-sm-4">Work Station Name</label>
                <div class="col-sm-8">
                    <input type="text" class="form-control" name="name" id="name" ng-model="WorkStation.Name"/>
                </div>
            </div>
        </div>
        <div class="col-sm-12">
            <div class="form-group">
                <label class="control-label col-sm-4">Work Station Type</label>
                <div class="col-sm-8">
                    <searchableselect id="ddlWorkStationType" ng-id="type_id" ng-name="type_id" tab-index="2" ng-model="WorkStation.WorkStationTypeId" data-field="WorkStationTypes" data-val="WorkStationTypeId" data-text="Name"></searchableselect>

                </div>
            </div>
        </div>
        <div class="col-sm-12">
            <div class="form-group">
                <label class="control-label col-sm-4">Description</label>
                <div class="col-sm-8">
                    <textarea class="form-control"  ng-model="WorkStation.Description" style="height:50px;width:100%" />
                </div>
            </div>
        </div>
        <div class="col-sm-12">
            <div class="col-sm-offset-4 col-sm-8">
                <button class="btn btn-default" ui-sref="workstations">Cancel</button>
                <button class="btn btn-primary" ng-click="Save()">Save</button>
                <button class="btn btn-danger pull-right" ng-show="AccessData.Edit && WorkStation.WorkStationId > 0" ng-click="delete()">Delete</button>

            </div>
        </div>
    </form>
</div>
