<div class="clearfix">&nbsp;</div>

<div class="col-lg-12">


    <form class="form-horizontal">
        <div class="col-sm-6">

            <div class="col-sm-12">
                <div class="form-group">
                    <label for="inputEmail3" class="col-sm-3 control-label">Item</label>
                    <div class="col-sm-8">
                        <product bound-Action="onBOMItemSelected(value)" tabindex="1" id="'mainItem'"
                                 ng-model="BOM.Product"></product>
                        <p>Item to be manufactured or repacked</p>
                    </div>

                </div>
            </div>
            <div class="col-sm-12">
                <div class="form-group">
                    <label for="inputEmail3" class="col-sm-3 control-label">Description</label>
                    <div class="col-sm-8">
                        <textarea  id="val_description" tabindex="1" name="val_productName" style="height:80px;"
                               ng-model="BOM.Description" class="form-control" maxlength="500" />
                    </div>

                </div>
            </div>
            <div class="col-sm-12">
                <div class="form-group">
                    <label for="inputEmail3" class="col-sm-3 control-label">Quantity</label>
                    <div class="col-sm-8">
                        <input type="text" id="val_productName" tabindex="1" name="val_productName" ng-model="BOM.Quantity" class="form-control" maxlength="50" />
                        <p>Quantity of item obtained after manufacturing / repacking from given quantities of raw materials</p>
                    </div>

                </div>
            </div>

        </div>
        <div class="col-sm-12">
            <h4>Raw Materials</h4>
            <div class="table-responsive">
                <table class="table table-condensed">
                    <tr class="headerRow">
                        <th colspan="2">
                            Item
                            <product bound-Action="onItemSelected(value)" tabindex="3" id="'addProduct'" ng-model="bomItem.Product"></product>
                        </th>
                        <th class="text-right">
                            Quantity
                            <input class="form-control maskednumber" ng-model="bomItem.Quantity" id="txtbomQty" tabindex="2" />
                        </th>
                        <!--<th class="text-right">
                            Rate
                            <input class="form-control maskednumber" ng-model="bomItem.Rate" tabindex="3" />
                        </th>-->
                        <th colspan="3" style="vertical-align:bottom">
                            <button type="button" class="btn btn-primary" ng-keydown="add();" stopfocus="true" tabindex="4" ng-click="add()">Add</button>
                        </th>
                    </tr>
                    <tr class="headerRow">
                        <th class="text-center" style="width:50px">S.No</th>
                        <th style="width:250px;">Item</th>
                        <th class="text-right" style="width:50px">Quantity</th>
                        <th class="text-center" style="width: 50px">UOM</th>
                        <!--<th class="text-right" style="width: 150px">Rate</th>-->
                        <th class="text-right" style="width: 100px">Amount</th>

                        <th style="width: 50px" class="text-center">Actions</th>
                    </tr>
                    <tr ng-repeat="item in RawMaterial">
                        <td class="text-center">
                            {{$index+1}}
                        </td>
                        <td>  {{item.Product}}  </td>

                        <td class="text-right"> <input class="form-control maskednumber" ng-model="item.Quantity" style="border-color: transparent" /></td>
                        <td class="text-center">{{item.Unit}}</td>
                        <!--<td class="text-right">
                            <input class="form-control maskednumber" ng-model="item.Rate" style="border-color: transparent" />
                        </td>-->
                        <td class="text-right">{{(item.Quantity * item.Rate) | number:2}}</td>
                        <td class="text-center">
                            <i class="fa fa-trash fa-2x" ng-click="delete($index)"></i>
                        </td>
                    </tr>

                </table>

            </div>
        </div>
        <div class="col-sm-12">
            <div class="col-sm-6">

                <button class="btn btn-default" ui-sref="bom">Cancel</button>
                <button class="btn btn-primary" ng-click="save()">Save</button>

            </div>
            <div class="col-sm-6">
                <button class="btn btn-danger pull-right" ng-show="AccessData.Delete && BOM.BomId > 0" ng-click="deleteBOM()">Delete</button>

            </div>
        </div>
    </form>
</div>
