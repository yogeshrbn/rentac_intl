<!--<pageheader heading="Party-Wise Pendency Register" />-->
<div class="col-sm-12">
    <div class="row">
        <div class="col-sm-3">
            <label>Choose Party</label>
            <!--<searchabletext ng-id="client" data-item="Client" data-all="true" tab-index="1" selected-object="LedgerSelect" name="client_value" field-required="true"> </searchabletext>-->
            <searchableselect name="client" tabindex="2" data-field="Accounts" ng-model="Filter.LedgerId" data-val="LedgerId" data-text="Name" description-field="Code"></searchableselect>
        </div>


        <div class="col-sm-3">
            <label>&nbsp;</label>
            <div>
                <input type="button" class="btn btn-primary" tabindex="3" value="Get Rent" ng-click="GetRent();" />
                <!--<input type="button" class="btn btn-primary" tabindex="3" value="Print Report " ng-click="Print();" />-->
                Total: {{Rent|sum:'Total'|number:2}}
            </div>
        </div>
    </div>

</div>

<div class="form-group">

    <div class="col-lg-12">
        <div class=" table-responsive" style="margin-top:7px;">
            <table class="table table-condensed">

                <tr class="headerRow">

                    <th style="width: 5%">#</th>
                    <th style="width: 27%;">Party</th>
                    <th style="width: 20%;">Amount</th>



                </tr>
                <tr ng-repeat="item in Rent">
                    <td>{{$index+1}}</td>

                    <td>{{item.Client}}</td>

                    <td style="width: 8%">{{item.Total|number:2}}</td>

                </tr>



            </table>
        </div>
    </div>
</div>
