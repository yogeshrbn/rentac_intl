<div class="form-group">
   <!-- <div class="col-lg-12">
        <h3>Clients Listing</h3>
    </div>-->
    <div class="clearfix">&nbsp;</div>
    <div class="alert alert-success" ng-show="Ledgers.length==null">
        {{Message.NoCompaniesFound}}
    </div>
    <div class="col-sm-12">



        <table class="table table-condensed table-responsive" med-key>
            <tr class="filterRow hidden-xs">
                <th>
                    <input type="text" class="form-control" placeholder="Find by code" ng-model="filterCode" />
                </th>
                <th>
                    <input type="text" class="form-control" placeholder="Find by name" ng-model="filterName" /></th>
                <th>
                    <input type="button" value="Find" class="btn btn-primary" ng-click="Find();" />
                    <!--<input type="button" value="Advance Filter" class="btn btn-primary" />-->
                </th>
                <th></th>
            </tr>
            <tr class="headerRow">
                <th>Code</th>
                <th>Name</th>
                <th>Address</th>
                <th>Actions</th>


            </tr>
            <!--ng-repeat="item in Ledgers | filter: filterCode | filter:filterName"-->
            <tr  dir-paginate="item in Ledgers | itemsPerPage: 5 |filter: search:strict">
                <td>{{item.Code}}
                </td>
                <td>{{item.Name}}
                </td>
                <td>{{item.Address1}},{{item.Address2}}
                </td>
                <td>
                    <a href="#ledger?lId={{item.LedgerId}}"><span class="fa fa-edit text-primary"></span></a>&nbsp;&nbsp;
                   <a ng-show="{{item.IsActive}}==0" ng-click="Activate(1,item.LedgerId);"><span class="fa fa-trash text-danger"></span></a>
                    <a ng-show="{{item.IsActive}}==1" ng-click="Activate(0,item.LedgerId);"><span class="fa fa-check text-primary"></span></a>
                </td>
            </tr>

        </table>
       <dir-pagination-controls></dir-pagination-controls>
    </div>
</div>
