
<div style="margin:15px" class="tblPrint">
    <style>
        .tblPrint {
            th {
                   font-size:10px;
            padding: 2px;
            background-color: gainsboro;
            border-top: solid 1px black;
            border-bottom: solid 1px;
            border-right: solid 1px;
        }

        th:first-of-type {
            border-left: solid 1px black;
        }

        td {
            font-size: 10px;
            padding: 2px;
            border-right: solid 1px black;
            border-bottom: solid 1px black;
        }

            td:first-of-type {
                border-left: solid 1px black;
            }
        }
    </style>
    <table style="width: 100%; border-collapse:collapse;" role="rowgroup" cellspacing="0">
        <tr>
            <th>Name</th>
            <th>Code</th>
            <th>Address1</th>
            <th>Phone</th>
            <th>Aadhar</th>
            <th>Role</th>
            <th>Status</th>

        </tr>
        <tr ng-repeat="item in data">
            <td>
                {{item.Name}}
            </td>
            <td>{{item.EmployeeCode}}</td>
            <td>
                {{item.Address}}
            </td>
            <td>{{item.Phone}}</td>
            <td>{{item.Aadhar}}</td>
            <td>{{item.RoleName}}</td>
            <td>{{item.StatusName}}</td>
        </tr>
    </table>
</div>
