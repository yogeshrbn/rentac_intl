
<div style="margin:15px" class="tblPrint">
    <style>
        .tblPrint {
            th

        {
            font-size: 10px;
            padding: 2px;
            background-color: gainsboro;
            border-top: solid 1px black;
            border-bottom: solid 1px;
            border-right: solid 1px;
        }

        th:first-of-type {
            border-left: solid 1px black;
        }

        td {
            font-size: 10px;
            padding: 2px;
            border-right: solid 1px black;
            border-bottom: solid 1px black;
        }

            td:first-of-type {
                border-left: solid 1px black;
            }
        }
    </style>
    <table class="table table-condensed table-responsive table-list">
        <tr ng-repeat-start="(key,value) in data | groupBy: 'Product'" style="background:#E3F2FD;">
            <td>
                <div class="col-sm-12">

                    <label>{{$index+1}}) - {{key}}</label>
                    <i class="fa fa-chevron-down toggle" style="cursor: pointer;" data-toggle="collapse" data-target="#tr{{$index}}"></i>


                </div>
            </td>

        </tr>
        <tr ng-repeat-end class="childRows">
            <td>
                <div class="row row-eq-height" style="margin-left: 0px;">

                    <div class="col-sm-12">
                        <div class="collapse in" id="tr{{$index}}" style="border-left: solid 1px #e4e4e4;">
                            <table class="table table-condensed table-responsive" style="margin-bottom: 1px;float:right;">
                                <tr>
                                    <th>#</th>
                                    <th>Party</th>
                                    <!--<th class="text-right">OP</thclass="text-right">-->
                                    <th class="text-right">Issue</th>
                                    <th class="text-right">Receive</th>
                                    <th class="text-right">Balance</th>
                                </tr>
                                <tr ng-repeat="item in value">
                                    <td style="width: 90px">{{$index+1}}</td>
                                    <!--<td style="width: 40px;"></td>-->
                                    <td style="width: 52%">{{item.ClientName}}</td>

                                    <!--   <td class="text-right" style="width: 8%">{{item.OpeningBalance|number:2}}</td>  -->
                                    <td class="text-right" style="width: 14%">{{item.IssuedQty|number:2}}</td>
                                    <td class="text-right" style="width: 14%">{{item.ReceivedQty|number:2}}</td>
                                    <td class="text-right" style="width: 14%">{{item.ClosingBalance|number:2}}</td>
                                </tr>
                                <tr class="tblFooter">
                                    <td colspan="2" class="sub-total">Total</td>
                                    <!-- <td class="text-right sub-total"> <label>{{value  | sum:'OpeningBalance'| number:2}} </label> </td>-->
                                    <td class="text-right sub-total"> {{value  | sum:'IssuedQty' | number:2}}  </td>
                                    <td class="text-right sub-total"> {{value  | sum:'ReceivedQty'| number:2}}  </td>
                                    <td class="text-right sub-total"> {{value  | sum:'ClosingBalance'| number:2}}  </td>
                                </tr>
                            </table>

                        </div>
                    </div>
                </div>
            </td>




        </tr>


    </table>
</div>
