

<div class="table-responsive mt-2" ng-repeat="item in ReportData">
    <table class="table table-condensed">
        <tr>
            <th class="headerRow" style="width:100px;">Party:</th>
            <th colspan="3">{{item.Client}}</th>
        </tr>
        <tr>
            <th class="headerRow">Site:</th>
            <th colspan="3">{{item.Site}}</th>
        </tr>
        <tr>
            <th class="headerRow">Receipt Date:</th>
            <th>{{item.WorkOrderDate | date}}</th>
            <th class="headerRow" style="width:100px;">Receipt No: </th>
            <td>{{item.Number}}</td>
        </tr>
        <tr>
            <th class="headerRow">Charges Paid:</th>
            <th></th>
            <th class="headerRow">Additional Exp: </th>
            <td></td>
        </tr>
        <tr>
            <th class="headerRow">Vehicle No:</th>
            <th>{{item.Vehicle}}</th>
            <th class="headerRow">Driver Name: </th>
            <td>{{item.Driver}}</td>
        </tr>

    </table>
    <table class="table table-condensed">

        <tr class="headerRow">
            <th>Product</th>
            <th>Qty Sent</th>
        


            <th>Remraks</th>

        </tr>
        <tr ng-repeat="d in item.Items">
            <td>{{d.Product}}</td>
            <td>{{d.SentQty}}</td>
            <td>{{d.Remarks}}</td>
        </tr>
    </table>
    <hr />
</div>
