<div class="row">
    <div class="clearfix">&nbsp;</div>
    <!--<pageheader heading="Issue Items" />-->
    <div class="alert alert-success hide" ng-show="Ledgers.length==null">
        {{Message.NoCompaniesFound}}
    </div>
    <div class="col-sm-12">

        <div id="workOrderInfo" class="row">
            <form id="frmEwayBill" name="frmEwayBill" method="post" class="">
                <div class="col-sm-6">
                    <div class="row">
                        <div class="col-sm-12">
                            <div class="form-group">
                                <label for="inputEmail3" class="col-sm-4 control-label"> Part A </label>

                            </div>
                        </div>
                        <div class="col-sm-12 mt-1">
                            <div class="form-group">
                                <span for="inputEmail3" class="col-sm-4">Transaction Type</span>
                                <div class="col-sm-8">
                                    <!--<input type="text" id="val_productName" tabindex="1" name="val_productName" ng-model="Product.Name" class="form-control" />-->
                                    <select class="form-control" name="val_txnType" ng-model="EwayBill.TransactionType">
                                        <option ng-value="0">--Select--</option>
                                        <option ng-value="d.Id" ng-selected="EwayBill.TransactionType == d.Id" ng-repeat="d in TransacionTypes">{{d.Name}}</option>
                                    </select>

                                </div>


                            </div>
                            <div class="form-group">
                                <span for="inputEmail3" class="col-sm-4">Transaction Sub Type</span>
                                <div class="col-sm-8">
                                    <!--<input type="text" id="val_productName" tabindex="1" name="val_productName" ng-model="Product.Name" class="form-control" />-->
                                    <select class="form-control" name="val_subType" ng-model="EwayBill.SubTypeId">

                                        <option ng-value="0">--Select--</option>
                                        <option ng-value="d.Id" ng-selected="EwayBill.SubTypeId == d.Id" ng-repeat="d in SubTypes">{{d.Name}}</option>
                                    </select>

                                </div>


                            </div>
                            <div class="form-group mt-1" ng-if="EwayBill.SubTypeId == 8">
                                <span for="inputEmail3" class="col-sm-4">Specify Other Type</span>

                                <div class="col-sm-8">
                                    <input type="text" id="val_othertxnType" tabindex="1" name="val_othertxnType" ng-model="EwayBill.OtherTypeDesc" class="form-control" />


                                </div>
                            </div>
                        </div>
                        <div class="col-sm-12 mt-1">
                            <div class="form-group">
                                <span for="inputEmail3" class="col-sm-4">Transporter</span>
                                <div class="col-sm-8">

                                    <select class="form-control" ng-model="EwayBill.TransporterId" name="val_transporter">
                                        <option ng-value="0">--Select--</option>
                                        <option ng-value="d.TransporterId"
                                                ng-selected="EwayBill.TransporterId == d.TransporterId"
                                                ng-repeat="d in Transporters">
                                            {{d.Name}}
                                        </option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-12 mt-1">
                            <div class="form-group">
                                <span for="inputEmail3" class="col-sm-4">Distance (in Km)</span>
                                <div class="col-sm-8">
                                    <input type="number" id="val_productName" tabindex="1" name="val_distance" ng-model="EwayBill.Distance" class="form-control" />
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-12 mt-1">
                            <div class="form-group">
                                <span for="inputEmail3" class="col-sm-4">Approximate value</span>
                                <div class="col-sm-8">
                                    <input type="number" step="0.01" min="0" id="val_approximateValue" tabindex="1" name="val_approximateValue" ng-model="EwayBill.ApproximateValue" class="form-control" placeholder="Optional — total for e-way (incl. tax); overrides invoice total when set" />
                                </div>
                            </div>
                        </div>

                        <div class="col-sm-12 mt-1">
                            <div class="form-group">
                                <span for="inputEmail3" class="col-sm-4">Ship From</span>
                                <div class="col-sm-8">
                                    <textarea id="val_shipFromAddress" tabindex="1" name="val_shipFromAddress" style="height:70px;"
                                              maxlength="120" ng-model="EwayBill.ShipFromAddress" class="form-control" />
                                </div>
                            </div>
                            <div class="form-group">
                                <span for="inputEmail3" class="col-sm-4">State</span>
                                <div class="col-sm-8">

                                    <state ng-model="EwayBill.ShipFromStateId"></state>
                                </div>
                            </div>
                            <div class="form-group">
                                <span for="inputEmail3" class="col-sm-4">City</span>
                                <div class="col-sm-8">
                                    <input type="text" class="form-control" maxlength="50" ng-model="EwayBill.ShipFromCity" />
                                </div>
                            </div>
                            <div class="form-group">
                                <span for="inputEmail3" class="col-sm-4">Pin</span>
                                <div class="col-sm-8">
                                    <input type="text" class="form-control" maxlength="50" ng-model="EwayBill.ShipFromZipCode" />
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="row">
                        <div class="col-sm-12 mt-2">
                            <div class="form-group">
                                <label for="inputEmail3" class="col-sm-4 control-label">Part B</label>

                            </div>
                        </div>
                        <div class="col-sm-12 mt-1">
                            <div class="form-group">
                                <span class="col-sm-4">Mode Of Transportation</span>
                                <div class="col-sm-8">
                                    <div class="form-group">
                                        <div class="d-flex flex-wrap">
                                            <div class="radio-inline">
                                                <input type="radio" id="road" name="transportationMode" ng-model="EwayBill.TransportationMode" ng-value="1" class="custom-control-input">
                                                Road
                                            </div>
                                            <div class="radio-inline">
                                                <input type="radio" id="rail" name="transportationMode" ng-model="EwayBill.TransportationMode" ng-value="2" class="custom-control-input">
                                                Rail
                                            </div>
                                            <div class="radio-inline">
                                                <input type="radio" id="air" name="transportationMode" ng-model="EwayBill.TransportationMode" ng-value="3" class="custom-control-input">
                                                Air
                                            </div>

                                        </div>
                                    </div>

                                </div>
                            </div>

                        </div>

                        <div class="col-sm-12 mt-1">



                            <div class="form-group">
                                <span for="inputEmail3" class="col-sm-4">Vehicle Type</span>
                                <div class="col-sm-8">


                                    <div style="display: flex;width:77%;  flex-wrap: nowrap; justify-content: space-around; align-items: center;">
                                        <input type="radio" value="R" name="vehicleType" ng-model="EwayBill.VehicleType">Regular
                                        <input type="radio" value="O" name="vehicleType" ng-model="EwayBill.VehicleType">Over Dimentional Cargo
                                    </div>



                                </div>
                            </div>
                        </div>
                        <div class="col-sm-12 mt-1">
                            <div class="form-group">
                                <span for="inputEmail3" class="col-sm-4">Vehicle No</span>
                                <div class="col-sm-8">
                                    <input type="text" id="val_productName" tabindex="1" name="val_productName" ng-model="EwayBill.VehicleNo" class="form-control" />
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-12 mt-1">
                            <div class="form-group">
                                <span for="inputEmail3" class="col-sm-4">Transporter's Doc No'</span>
                                <div class="col-sm-8">
                                    <input type="text" id="val_productName" tabindex="1" name="val_productName" ng-model="EwayBill.TransporterDocNo" class="form-control" />
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-12 mt-1">
                            <div class="form-group">
                                <span for="inputEmail3" class="col-sm-4">Transporter's Doc Date</span>
                                <div class="col-sm-8">
                                    <datepicker date-format="dd/MM/yyyy">
                                        <input type="text" ng-model="EwayBill.TransporterDocDate" tabindex="1" class="form-control" field-required="true" name="TransactionDate" />
                                    </datepicker>
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-12 mt-1">
                            <div class="form-group">
                                <span for="inputEmail3" class="col-sm-4">Ship To</span>
                                <div class="col-sm-8">
                                    <textarea id="val_shipToAddress" tabindex="1" name="val_shipToAddress" style="height:70px;"
                                              maxlength="120" ng-model="EwayBill.ShipToAddress" class="form-control" />
                                </div>
                            </div>
                            <div class="form-group">
                                <span for="inputEmail3" class="col-sm-4">State</span>
                                <div class="col-sm-8">
                                    <state ng-model="EwayBill.ShipToStateId"></state>
                                </div>
                            </div>
                            <div class="form-group">
                                <span for="inputEmail3" class="col-sm-4">City</span>
                                <div class="col-sm-8">
                                    <input type="text" class="form-control" maxlength="50" ng-model="EwayBill.ShipToCity" />
                                </div>
                            </div>
                            <div class="form-group">
                                <span for="inputEmail3" class="col-sm-4">Pin</span>
                                <div class="col-sm-8">
                                    <input type="text" class="form-control" maxlength="10" ng-model="EwayBill.ShipToZipCode" />
                                </div>
                            </div>
                        </div>

                    </div>
                </div>




            </form>
        </div>

    </div>
    <div class="col-sm-12" ng-switch on="EwayBill.DocType">
        <div class="col-sm-12" ng-switch-when="inv">
            <div class="col-sm-12">
                <div class="form-group">
                    <label for="inputEmail3" class="col-sm-4 control-label">Invoice Details</label>

                </div>
            </div>
            <div class="col-sm-12 mt-1">
                <div class="form-group">
                    <span for="inputEmail3" class="col-sm-4">Invoice#</span>
                    <div class="col-sm-8">
                        <label>{{Billing.InvoiceNumber}}</label>
                    </div>
                </div>
            </div>
            <div class="col-sm-12 mt-1">
                <div class="form-group">
                    <span for="inputEmail3" class="col-sm-4">Invoice Date</span>
                    <div class="col-sm-8">
                        <label> {{Billing.InvoiceDate | date}}</label>
                        <!--<input type="text" id="val_productName" tabindex="1" name="val_productName"  ng-model="Billing.InvoiceDate" class="form-control" />-->
                    </div>
                </div>
            </div>
            <div class="col-sm-12 mt-1">
                <div class="form-group">
                    <span for="inputEmail3" class="col-sm-4">Customer Name</span>
                    <div class="col-sm-8">
                        <label>{{Billing.Client}}</label>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-sm-12" ng-switch-when="chl">
            <div class="row">
                <div class="form-group">
                    <label for="inputEmail3" class="col-sm-4 control-label">Delivery Challan Details</label>

                </div>
            </div>
            <div class="row mt-1">
                <div class="col-sm-12">
                    <table class="table table-condensed table-responsive tableInput">
                        <tr>
                            <th style="width:100px;" class="headerRow">Challan#</th>
                            <th style="width:200px;">{{Billing.Number}}</th>
                            <th style="width:100px;" class="headerRow">Challan Date</th>
                            <th> {{Billing.WorkOrderDate | date}}</th>

                        </tr>
                        <tr>
                            <th class="headerRow">Client</th>
                            <th colspan="3">{{Billing.Client}}</th>
                        </tr>
                    </table>
                </div>

                <div class="row mt-2">

                </div>
            </div>
        </div>
        <div class="col-sm-12">
            <div class="table-responsive">
                <table class="table table-condensed table-responsive tableInput">
                    <tr class="headerRow">
                        <th style="width:50px;" class="text-center">Sr.No</th>
                        <th style="width:400px;">Item</th>
                        <th class="text-center" style="width:100px;">HSN Code</th>
                        <th class="text-right" style="width:50px;">Quantity</th>
                        <th class="text-right">Rate</th>

                        <th class="text-right">IGST %</th>
                        <th class="text-right">CGST %</th>
                        <th class="text-right">SGST %</th>
                        <!--<th>Tax Amount</th>-->
                        <th class="text-right" style="width:120px;"> SubTotal</th>
                        <th class="text-center" style="width:80px;">Action</th>
                    </tr>
                    <tr ng-repeat="item in EwayBill.Items">
                        <td class="text-center">{{$index+1}}</td>
                        <td>
                            <!--<textarea style="width:100%;height:50px;" ng-model="item.Product"></textarea>-->
                            <input type="text" class="form-control" ng-model="item.Product" maxlength="500" />
                        </td>
                        <td class="text-center">
                            <input type="text" class="form-control text-center" ng-model="item.HSNCode" maxlength="15" />
                        </td>
                        <td class="text-center">
                            <input type="text" class="form-control maskednumber" ng-model="item.Quantity" maxlength="12" />
                        </td>
                        <td class="text-center">
                            <input type="text" class="form-control maskednumber" ng-model="item.Rate" maxlength="12" />
                        </td>
                        <td class="text-center">
                            <input type="text" class="form-control maskednumber" ng-model="item.IGSTRate" maxlength="12" ng-change="onGSTRateChange(item)" />
                        </td>
                        <td class="text-center">
                            <input type="text" class="form-control maskednumber" ng-model="item.CGSTRate" maxlength="12" ng-change="onCGSTRateChange(item)" />
                        </td>
                        <td class="text-center">
                            <input type="text" class="form-control maskednumber" ng-model="item.SGSTRate" maxlength="12" ng-change="onSGSTRateChange(item)" />
                        </td>
                        <!--<td>
                            <input type="text" class="form-control" />
                        </td>-->
                        <td class="text-right">
                            {{item.SubTotal | number:2}}
                        </td>
                        <td class="text-center">
                            <a href="javascript:void()" ng-click="DeleteItem($index)"><i class="fa fa-trash fa-2x text-danger"></i></a>
                        </td>
                    </tr>
                    <tr class="tblFooter">
                        <td colspan="8" class="text-right"><strong>Total</strong></td>
                        <td class="text-right">{{ EwayBill.Items  | sum: 'SubTotal' | number: 2}}</td>
                        <td class="text-center">
                            <a href="javascript:void()" ng-click="addItem()">
                                <i class="fa fa-plus-circle fa-2x"></i>
                            </a>
                        </td>
                    </tr>
                </table>
            </div>
        </div>
        <div class="col-sm-12 mt-3">
            <div class="form-group">

                <div class="col-sm-8">
                    <button class="btn btn-default" ng-click="back();">Cancel</button>
                    <button class="btn btn-primary" ng-click="Save()">Save</button>&nbsp;

                </div>
            </div>
        </div>
        <script lang="ja">
            $('.tabContainer a').click(function (e) {
                e.preventDefault();
            });

        </script>
    </div>
