<select class="form-control" ng-model="month">
    <option value="1" ng-selected="month == 1">Jan</option>
    <option value="2" ng-selected="month == 2">Feb</option>
    <option value="3" ng-selected="month == 3">Mar</option>
    <option value="4" ng-selected="month == 4">Apr</option>
    <option value="5" ng-selected="month == 5">May</option>
    <option value="6" ng-selected="month == 6">Jun</option>
    <option value="7" ng-selected="month == 7">Jul</option>
    <option value="8" ng-selected="month == 8">Aug</option>
    <option value="9" ng-selected="month == 9">Sep</option>
    <option value="10" ng-selected="month == 10">Oct</option>
    <option value="11" ng-selected="month == 11">Nov</option>
    <option value="12" ng-selected="month == 12">Dec</option>
</select>
