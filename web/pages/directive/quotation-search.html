<div>
    <input type="text" id="{{productSearch}}" class="form-control" ng-model="Product" tabindex="1" />

    <div class="modal fade" id="{{dialogId}}"   role="dialog" aria-labelledby="modalLabel" aria-hidden="true">
        <div class="modal-dialog" style="width:46%;" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                    <h4 class="modal-title">Find Item</h4>
                </div>
                <div class="modal-body">
                    <input type="text" class="form-control" ng-model="Search.Name" id="{{dlgtxtkeyWordToFind}}" ng-keydown="onKeyDown($event)" />
                    <div class="table-responsive" style="overflow-y:auto;max-height:300px">
                        <table class="table table-condensed" med-key id="{{tblProducts}}">
                            <tr class="headerRow">
                                <th>Code</th>
                                <th>Product</th>
                                <th>Unit</th>
                            </tr>
                            <tr ng-repeat="item in Products  |filter: Search:strict" id='{{item.ProductId}}' onedit="editRow(productId)">
                                <td>{{item.Code}}</td>
                                <td>{{item.Name}}</td>
                                <td>
                                    {{item.Unit}}

                                </td>
                            </tr>
                        </table>
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="btnCancelProfileDialog" type="button" class="btn btn-primary" data-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>
</div>
